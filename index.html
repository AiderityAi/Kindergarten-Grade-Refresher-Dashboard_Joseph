<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Joseph's Turbo Quest Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1E6FFF;
  --blue-deep:#0A47C2;
  --cyan:#00D4FF;
  --red:#EE3B32;
  --red-deep:#C41E17;
  --gold:#FFC72C;
  --gold-deep:#E0A400;
  --green:#22B24C;
  --green-deep:#178A38;
  --purple:#7B4FE0;
  --dark:#12163A;
  --dark-soft:#4A5080;
  --cream:#F2F7FF;
  --white:#FFFFFF;
  --shadow: 0 8px 0 rgba(18,22,58,0.18);
  --radius: 26px;
  --speed: linear-gradient(90deg, var(--blue), var(--cyan), var(--gold), var(--red), var(--purple), var(--blue));
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Quicksand',sans-serif;
  background:
    radial-gradient(circle at 6% 10%, rgba(30,111,255,0.16) 0%, transparent 40%),
    radial-gradient(circle at 94% 8%, rgba(238,59,50,0.14) 0%, transparent 40%),
    radial-gradient(circle at 12% 90%, rgba(255,199,44,0.18) 0%, transparent 42%),
    radial-gradient(circle at 90% 90%, rgba(123,79,224,0.16) 0%, transparent 42%),
    radial-gradient(circle at 50% 50%, rgba(0,212,255,0.08) 0%, transparent 55%),
    var(--cream);
  color:var(--dark);
  min-height:100vh;
  -webkit-tap-highlight-color: transparent;
  position:relative;
}
body::before{
  content:'⭐  🍄  💰  ⚡  🏁  ⭐  🍄  💰  ⚡  🏁';
  position:fixed;inset:-40px auto auto -20px;width:140%;
  font-size:26px;line-height:3.4;letter-spacing:22px;
  opacity:0.06;color:var(--blue-deep);
  pointer-events:none;z-index:0;white-space:pre-wrap;transform:rotate(-6deg);
}
body::after{
  content:'🏁  ⚡  💰  🍄  ⭐  🏁  ⚡  💰  🍄  ⭐';
  position:fixed;inset:auto -20px -40px auto;width:140%;
  font-size:26px;line-height:3.4;letter-spacing:22px;
  opacity:0.06;color:var(--red-deep);
  pointer-events:none;z-index:0;white-space:pre-wrap;transform:rotate(-6deg);
}
h1,h2,h3,h4,.display{font-family:'Baloo 2',cursive;}
button{font-family:'Quicksand',sans-serif;cursor:pointer;}
.app{max-width:900px;margin:0 auto;padding:16px 16px 60px;position:relative;z-index:1;}
.speed-strip{height:8px;border-radius:8px;background:var(--speed);background-size:200% 100%;margin-bottom:14px;animation:speedmove 5s linear infinite;}
@keyframes speedmove{0%{background-position:0% 0;}100%{background-position:200% 0;}}

/* ---------- HEADER / NAV ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--white);
  border-radius:24px;
  border:3px solid #dbe8ff;
  padding:12px 18px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
  gap:10px;flex-wrap:wrap;
  position:relative;overflow:hidden;
}
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:7px;
  background:var(--speed);background-size:200% 100%;animation:speedmove 5s linear infinite;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-badge{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--red));
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 4px 0 rgba(0,0,0,0.15);
  border:3px solid white;outline:2px solid #ffe08a;
}
.brand-text{line-height:1.05;}
.brand-text .t1{font-size:12px;color:var(--red-deep);font-weight:800;letter-spacing:0.5px;}
.brand-text .t2{font-size:19px;font-weight:800;background:linear-gradient(90deg,var(--blue-deep),var(--red-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}
.coin-counter{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#fff2c9,#ffe090);
  border-radius:20px;padding:8px 14px;font-weight:800;color:#8a5c00;
  font-family:'Baloo 2',cursive;font-size:16px;border:2px solid #ffdc8a;
}
nav.tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 12px;margin-bottom:6px;scrollbar-width:none;}
nav.tabs::-webkit-scrollbar{display:none;}
nav.tabs button{
  flex:0 0 auto;border:none;border-radius:18px;padding:10px 16px;
  background:var(--white);color:var(--dark-soft);font-weight:700;font-size:14px;
  box-shadow:0 4px 0 rgba(18,22,58,0.08);transition:transform .12s ease;
  border:2px solid #e4edff;
}
nav.tabs button.active{
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));
  color:white;box-shadow:0 4px 0 rgba(18,22,58,0.25);border-color:transparent;
}
nav.tabs button:active{transform:translateY(2px);}

/* ---------- CARDS ---------- */
.card{
  background:var(--white);border-radius:var(--radius);padding:22px;
  box-shadow:var(--shadow);margin-bottom:18px;position:relative;overflow:hidden;
  border:3px solid #e4edff;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:var(--speed);background-size:200% 100%;animation:speedmove 6s linear infinite;}
.card::after{content:'⭐';position:absolute;top:14px;right:16px;font-size:22px;opacity:0.45;transform:rotate(12deg);}
.card h2{margin:0 0 4px;font-size:24px;}
.card .sub{color:var(--dark-soft);font-size:14px;margin-bottom:14px;font-weight:600;}
.big-btn{
  border:none;border-radius:20px;padding:16px 22px;font-weight:800;font-size:17px;
  color:white;background:linear-gradient(135deg,var(--red),var(--red-deep));
  box-shadow:0 5px 0 rgba(196,30,23,0.4);width:100%;font-family:'Baloo 2',cursive;
  transition:transform .1s ease;
}
.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(196,30,23,0.4);}
.big-btn.blue{background:linear-gradient(135deg,var(--blue),var(--blue-deep));box-shadow:0 5px 0 rgba(10,71,194,0.4);}
.big-btn.green{background:linear-gradient(135deg,var(--green),var(--green-deep));box-shadow:0 5px 0 rgba(23,138,56,0.4);}
.big-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-deep));box-shadow:0 5px 0 rgba(224,164,0,0.4);color:#5c3f00;}
.big-btn.purple{background:linear-gradient(135deg,var(--purple),#5b34b8);box-shadow:0 5px 0 rgba(91,52,184,0.4);}
.big-btn:disabled{opacity:0.4;box-shadow:none;transform:none;}
.pill{display:inline-block;padding:5px 12px;border-radius:14px;font-size:12px;font-weight:800;background:#eaf1ff;color:var(--blue-deep);}

/* ---------- HOME / DAY GRID ---------- */
.mascot-row{display:flex;justify-content:center;gap:14px;margin:6px 0 18px;font-size:40px;flex-wrap:wrap;}
.mascot-row span{background:var(--white);border-radius:50%;width:74px;height:74px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);border:3px solid #dbe8ff;outline:2px dashed #cfe0ff;outline-offset:3px;}
@media(max-width:420px){.mascot-row{gap:8px;font-size:32px;}.mascot-row span{width:58px;height:58px;}}
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;}
.day-chip{
  border:none;border-radius:16px;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Baloo 2',cursive;font-weight:700;font-size:18px;background:#eaf1ff;color:var(--blue-deep);
  box-shadow:0 4px 0 rgba(30,111,255,0.2);gap:2px;border:2px solid #d9e6ff;
}
.day-chip .lbl{font-size:9px;font-weight:700;opacity:0.75;}
.day-chip.done{background:linear-gradient(135deg,var(--green),var(--green-deep));color:white;box-shadow:0 4px 0 rgba(23,138,56,0.4);border-color:transparent;}
.day-chip.today{background:linear-gradient(135deg,var(--red),var(--red-deep));color:white;box-shadow:0 4px 0 rgba(196,30,23,0.4);border-color:transparent;}
.day-chip.locked{opacity:0.4;}
.progressbar{height:14px;border-radius:10px;background:#eaf1ff;overflow:hidden;margin:8px 0 4px;border:1px solid #d9e6ff;}
.progressbar > div{height:100%;background:var(--speed);background-size:200% 100%;animation:speedmove 4s linear infinite;border-radius:10px;transition:width .4s ease;}

/* ---------- DAY VIEW / SECTIONS ---------- */
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.section-grid{grid-template-columns:1fr;}}
.section-card{border-radius:20px;padding:16px;background:#f7faff;border:2px solid #dbe8ff;display:flex;flex-direction:column;gap:8px;position:relative;transition:transform .12s ease;}
.section-card:active{transform:scale(0.97);}
.section-card.complete{border-color:var(--green);background:#eefdf2;}
.section-card .icon{font-size:30px;}
.section-card h3{margin:0;font-size:16px;}
.section-card p{margin:0;font-size:13px;color:var(--dark-soft);font-weight:600;}
.check-badge{position:absolute;top:10px;right:10px;font-size:20px;}

/* ---------- FLASHCARD / GAME AREA ---------- */
.stage{border-radius:24px;padding:24px;text-align:center;background:linear-gradient(160deg,#eaf3ff,#fff7e0 55%,#ffecec);border:3px dashed #b9d3ff;position:relative;overflow:hidden;}
.stage::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--speed);background-size:200% 100%;animation:speedmove 5s linear infinite;}
.flash-emoji{font-size:90px;line-height:1;margin-bottom:6px;}
.flash-big-letter{font-family:'Baloo 2',cursive;font-size:100px;font-weight:800;background:linear-gradient(135deg,var(--blue-deep),var(--red-deep));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
.flash-caption{font-size:20px;font-weight:700;margin-top:6px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
.opt-btn{border:none;border-radius:18px;padding:18px 10px;font-size:19px;font-weight:800;background:white;box-shadow:0 4px 0 rgba(18,22,58,0.12);font-family:'Baloo 2',cursive;color:var(--dark);border:2px solid #eaf1ff;}
.opt-btn.correct{background:linear-gradient(135deg,var(--green),var(--green-deep));color:white;border-color:transparent;}
.opt-btn.wrong{background:linear-gradient(135deg,#ff9d9d,#e56b6b);color:white;border-color:transparent;}
.hint-box{margin-top:16px;background:#fff7e0;border-radius:16px;padding:12px 16px;font-weight:700;color:#7a5b00;font-size:14px;text-align:left;border:2px solid #ffe8a8;}
.feedback{margin-top:14px;font-family:'Baloo 2',cursive;font-size:19px;}
.tries-dots{display:flex;gap:6px;justify-content:center;margin-top:10px;}
.tries-dots span{width:10px;height:10px;border-radius:50%;background:#dbe8ff;}
.tries-dots span.used{background:var(--red);}
.tier-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#5c3f00;padding:4px 12px;border-radius:12px;font-weight:800;font-size:12px;margin-bottom:8px;}

/* Tracing */
canvas.trace-canvas{width:100%;max-width:360px;height:260px;background:white;border-radius:20px;border:3px solid #b9d3ff;touch-action:none;display:block;margin:0 auto;}
.trace-controls{display:flex;gap:10px;justify-content:center;margin-top:12px;}
.small-btn{border:none;border-radius:14px;padding:10px 16px;font-weight:700;background:#eaf1ff;color:var(--blue-deep);border:2px solid #d9e6ff;}

/* Memory match */
.memgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:420px;margin:0 auto;}
.memcard{aspect-ratio:1/1;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:24px;color:white;box-shadow:0 4px 0 rgba(18,22,58,0.2);}
.memcard.flipped,.memcard.matched{background:white;color:var(--dark);}
.memcard.matched{background:linear-gradient(135deg,var(--green),var(--green-deep));color:white;}

/* Reading corner */
.book-cover{width:100%;border-radius:18px;background:linear-gradient(135deg,#dbe8ff,#fff2c9 55%,#ffdada);padding:24px;text-align:center;margin-bottom:14px;border:3px solid #b9d3ff;position:relative;overflow:hidden;}
.book-cover::before{content:'⭐';position:absolute;top:8px;left:12px;font-size:22px;opacity:0.6;}
.book-cover::after{content:'💰';position:absolute;top:8px;right:12px;font-size:22px;opacity:0.6;}
.book-cover .emoji{font-size:56px;}
.vocab-chip{display:inline-block;background:#eafaf0;color:#1d7a4a;border-radius:12px;padding:6px 12px;font-weight:700;font-size:13px;margin:4px 4px 0 0;border:1px solid #c9f2d8;}
ul.fun-list{padding-left:18px;margin:6px 0;}
ul.fun-list li{margin-bottom:6px;font-size:14px;font-weight:600;color:var(--dark-soft);}

/* Rewards */
.sticker-wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:10px;}
.sticker{font-size:34px;background:#f7faff;border-radius:14px;display:flex;align-items:center;justify-content:center;aspect-ratio:1/1;box-shadow:0 3px 0 rgba(18,22,58,0.1);border:2px solid #dbe8ff;}
.sticker.locked{opacity:0.25;filter:grayscale(1);}

/* Parent dashboard bars */
.bar-row{margin-bottom:12px;}
.bar-row .lbl{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px;}
.bar-track{height:12px;background:#eaf1ff;border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;}

/* Confetti */
.confetti-piece{position:fixed;top:-20px;width:10px;height:16px;opacity:0.9;z-index:999;border-radius:3px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0.3;}}

/* Modal / celebration */
.overlay{position:fixed;inset:0;background:rgba(18,22,58,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal{background:white;border-radius:28px;padding:28px;max-width:360px;text-align:center;box-shadow:0 12px 0 rgba(0,0,0,0.15);border:4px solid transparent;background-image:linear-gradient(white,white),var(--speed);background-origin:border-box;background-clip:padding-box, border-box;}
.modal .big-emoji{font-size:64px;}

footer.note{text-align:center;font-size:11px;color:var(--dark-soft);opacity:0.75;margin-top:20px;line-height:1.5;}
.backbtn{background:none;border:none;color:var(--blue-deep);font-weight:800;font-size:14px;margin-bottom:10px;padding:6px 0;}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* =========================================================
   DATA
   Joseph is a bright kindergartner turning 6, heading to 1st grade.
   14 days review K skills + stretch into 1st grade concepts.
   Every math & reading section is adaptive across 3 tiers:
   Tier 1 = solid K review, Tier 2 = K mastery / early 1st, Tier 3 = 1st grade stretch challenge.
   ========================================================= */

// Each day has a math focus and a reading/phonics focus
const DAY_FOCUS = [
 {day:1,  mathTopic:'countTo20',      readTopic:'cvc',        sightSet:['the','see','like','go','can']},
 {day:2,  mathTopic:'addTo10',        readTopic:'rhyme',      sightSet:['I','you','my','we','look']},
 {day:3,  mathTopic:'subTo10',        readTopic:'blendBL_CL_FL', sightSet:['have','said','was','they']},
 {day:4,  mathTopic:'shapesColors',   readTopic:'blendST_TR_SP', sightSet:['come','some','play','little']},
 {day:5,  mathTopic:'patterns',       readTopic:'digraphSH_CH', sightSet:['what','when','where','who']},
 {day:6,  mathTopic:'skipCount2',     readTopic:'cvce',       sightSet:['make','take','ride','time']},
 {day:7,  mathTopic:'placeValue',     readTopic:'comprehension1', sightSet:['there','their','said','were']},
 {day:8,  mathTopic:'addTo20',        readTopic:'compoundWords', sightSet:['about','after','again','could']},
 {day:9,  mathTopic:'subTo20',        readTopic:'digraphWH_TH', sightSet:['because','before','friend','other']},
 {day:10, mathTopic:'timeHour',       readTopic:'blendGR_PL_SW', sightSet:['every','never','always','through']},
 {day:11, mathTopic:'measurement',    readTopic:'longVowelTeams', sightSet:['school','which','write','right']},
 {day:12, mathTopic:'money',          readTopic:'comprehension2', sightSet:['does','goes','been','into']},
 {day:13, mathTopic:'skipCount5_10',  readTopic:'contractions', sightSet:['once','upon','today','soon']},
 {day:14, mathTopic:'mixedReview',    readTopic:'mixedReview', sightSet:['first','second','third','next','last']}
];

const BOOKS = [
 {
   id:'frogtoad', title:'Frog and Toad Are Friends', author:'Arnold Lobel', emoji:'🐸',
   days:[1,2,3,4],
   videoUrl:'https://www.youtube.com/watch?v=ZnaiSve4duE',
   videoLabel:'Frog and Toad Are Friends — Read-Along Video',
   summary:"Frog and Toad share five gentle little adventures about friendship — waiting for spring, losing a button, telling stories, swimming, and writing a letter — showing how good friends look out for each other.",
   moment:"A favorite moment is when Frog cheers Toad up by making up a silly story, showing kindness matters more than getting things perfect.",
   vocab:['friend','together','patient','button','adventure'],
   funFacts:['This book is actually five short stories in one, so it is perfect for reading a little each day.','Frog and Toad are famous best friends in easy-reader books.','This story has won a Caldecott Honor award for its pictures.'],
   discussion:['What does it mean to be a good friend like Frog?','Why was Toad upset about his missing button?','Can you think of a time you helped a friend feel better?'],
   lesson:'True friends stay kind and patient with each other, even when things do not go as planned.',
   activity:'Draw a picture of you and a friend doing something fun together, just like Frog and Toad.'
 },
 {
   id:'elephantpiggie', title:'We Are in a Book!', author:'Mo Willems', emoji:'🐘',
   days:[5,6,7],
   videoUrl:'https://www.youtube.com/watch?v=LYZbsdHvl2s',
   videoLabel:'We Are in a Book! — Kids Book Read Aloud',
   summary:"Gerald the Elephant and Piggie discover something amazing — they are characters inside a book, and a reader is watching them! They have fun making the reader say a silly word, then worry about what happens when the book ends.",
   moment:"The funniest part is when Gerald and Piggie realize they can make the reader say 'Banana!' just by asking.",
   vocab:['reader','character','page','word','ending'],
   funFacts:['This book breaks the fourth wall, meaning the characters talk directly to you, the reader!','Mo Willems uses very few words but tells a big story through pictures and expressions.','The book has won many awards for helping new readers love books.'],
   discussion:['What silly word did Gerald and Piggie want you to say?','How did the characters feel about the book ending?','What would you do if you found out you were in a book?'],
   lesson:'Even when something feels like it is ending, there is always a way to start a new adventure — you can just read it again!',
   activity:'Come up with your own silly word and ask a family member to say it out loud, just like in the book.'
 },
 {
   id:'mercywatson', title:'Mercy Watson to the Rescue', author:'Kate DiCamillo', emoji:'🐷',
   days:[8,9,10,11],
   videoUrl:'https://www.youtube.com/watch?v=UL7ipvlaO38',
   videoLabel:'Mercy Watson to the Rescue — Read Aloud',
   summary:"Mercy is a lovable pig who thinks of herself as a 'porcine wonder.' When the Watsons' bed starts to break in the middle of the night, only Mercy's love of buttered toast can save the day.",
   moment:"The best part is watching Mercy race toward the smell of warm buttered toast, not realizing she is actually being a hero.",
   vocab:['porcine',' wonder','rescue','neighbor','buttered toast'],
   funFacts:['This is the first book in a whole series about Mercy the pig.','The story is broken into short chapters, great practice for first-grade chapter books.','Mercy loves buttered toast so much it becomes a running joke in every book.'],
   discussion:['Why did the Watsons think Mercy was a hero?','What is your favorite snack, like Mercy loves toast?','What happens when the neighbors get involved?'],
   lesson:'Sometimes we help others without even meaning to — just by being ourselves.',
   activity:'Make a list of three things that make YOU a hero, just like Mercy.'
 },
 {
   id:'flyguy', title:'Fly Guy Presents: Dinosaurs', author:'Tedd Arnold', emoji:'🦖',
   days:[12,13,14],
   videoUrl:'https://www.youtube.com/watch?v=PrSNsJ7EGfQ',
   videoLabel:'Fly Guy Presents: Dinosaurs — Read Aloud',
   summary:"Buzz and his pet fly, Fly Guy, take a nonfiction adventure through dinosaur facts — what they ate, how big they were, and how we learn about them from fossils.",

   vocab:['fossil','extinct','herbivore','carnivore','paleontologist'],
   funFacts:['This is a nonfiction book, meaning everything in it is true!','A scientist who studies dinosaurs is called a paleontologist.','Some dinosaurs were smaller than a chicken, while others were longer than a school bus.'],

];

/* =========================================================
   VIDEO LEARNING LIBRARY
   Real links to trusted channels where a specific verified video
   was found; safe filtered-search links (still one click to the
   right trusted-channel content) for the rest.
   ========================================================= */
const MATH_VIDEOS = {
  countTo20: {title:"Learn to Count 1 to 20 with Numberblocks", url:"https://www.youtube.com/watch?v=FhQ95Q79Hxo", channel:"Numberblocks"},
  addTo10: {title:"Addition within 10 with Numberblocks", url:"https://www.youtube.com/results?search_query=Numberblocks+addition+within+10", channel:"Numberblocks"},
  subTo10: {title:"Subtraction within 10 with Numberblocks", url:"https://www.youtube.com/results?search_query=Numberblocks+subtraction+within+10", channel:"Numberblocks"},
  shapesColors: {title:"Shapes & Colors for Kids", url:"https://www.youtube.com/results?search_query=Khan+Academy+Kids+shapes+and+colors", channel:"Khan Academy Kids"},

const STORAGE_KEY = 'joseph_turbo_academy_v1';
function defaultState(){
  return {
    coins:0,
    unlockedDay:1,
    days:{},
    tierProgress:{}, // per day+subject tier tracking not strictly needed, engine handles per-session
    stickers:[],
    memoryHistory:{},   // per-day memory game results: {pairs, timeSec, mistakes, rating}
    memoryBestTimes:{}, // best completion time per difficulty (pairs count)
  };
}
var state = load();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function dayState(d){
  if(!state.days[d]) state.days[d] = {math:false,reading:false,sight:false,ninja:false,write:false,memory:false,quiz:false,story:false,video:false,complete:false,videoNotes:{}};
  const s = state.days[d];
  if(s.video === undefined) s.video = false;
  if(!s.videoNotes) s.videoNotes = {};
  return s;
}
function getVideoNotes(d){ return dayState(d).videoNotes; }
const ALL_SECTIONS = ['math','reading','sight','ninja','write','memory','quiz','story','video'];
function sectionsDoneCount(d){
  const s = dayState(d);
  return ALL_SECTIONS.filter(k=>s[k]).length;
}
function markSectionComplete(d, key){
  const s = dayState(d);
  if(!s[key]){ s[key]=true; state.coins += 1; addSticker(d,key); }
  if(ALL_SECTIONS.every(k=>s[k]) && !s.complete){
    s.complete = true;
    state.coins += 5;
    if(state.unlockedDay === d && d < 14) state.unlockedDay = d+1;
    save();
    render('celebrate', {day:d});
    return;
  }
  save();
}
const STICKER_EMOJIS = ['⭐','💰','⚡','🏁','🍄','🎮','🔵','🏆','🧢','💎','🌟','🚀'];
function addSticker(d,key){
  const idx = (d*7 + ALL_SECTIONS.indexOf(key)) % STICKER_EMOJIS.length;
  state.stickers.push(STICKER_EMOJIS[idx]);
}

function shuffle(arr){ return arr.slice().sort(()=>Math.random()-0.5); }
function pickDistinct(pool, exclude, n){ const filtered = pool.filter(x=>String(x)!==String(exclude)); return shuffle(filtered).slice(0,n); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function launchConfetti(){
  const colors=['#1E6FFF','#00D4FF','#FFC72C','#EE3B32','#7B4FE0','#22B24C'];
  for(let i=0;i<36;i++){
    const p=document.createElement('div');
    p.className='confetti-piece';
    p.style.left = Math.random()*100+'vw';
    p.style.background = colors[i%colors.length];
    p.style.borderRadius = (i%3===0) ? '50%' : '3px';
    p.style.animationDuration = (2.2+Math.random()*1.6)+'s';

    setTimeout(()=>p.remove(), 4200);
  }
}

/* =========================================================
   GENERIC ADAPTIVE ENGINE (3-tier escalation)
   deck: [{stageHTML, options:[{label,correct}], hints:[...], explain, tier}]
   On correct answer -> advance to next card (which should be a harder tier if available)
   ========================================================= */
var engineState = {};
function startEngine(deckId, deck, onDeckComplete){
  engineState = {deckId, deck, idx:0, tries:0, locked:false, onDeckComplete};
  renderEngineCard();
}
function renderEngineCard(){
  const st = engineState;
  const item = st.deck[st.idx];
  const stageArea = document.getElementById('engine-stage');
  const optArea = document.getElementById('engine-opts');
  const feedArea = document.getElementById('engine-feedback');
  const dotsArea = document.getElementById('engine-dots');
  if(!stageArea) return;
  stageArea.innerHTML = (item.tier ? `<div class="tier-badge">${item.tier}</div>` : '') + item.stageHTML;
  optArea.innerHTML = item.options.map((o,i)=>`<button class="opt-btn" id="opt-${i}" onclick="answerEngine(${i})">${o.label}</button>`).join('');
  feedArea.innerHTML='';
  dotsArea.innerHTML = [0,1,2,3].map(i=>`<span class="${i < st.tries ? 'used':''}"></span>`).join('');
  st.locked=false;
  document.getElementById('engine-progress').innerText = `Card ${st.idx+1} of ${st.deck.length}`;
}
function answerEngine(i){
  const st = engineState;
  if(st.locked) return;
  const item = st.deck[st.idx];
  const opt = item.options[i];
  const feedArea = document.getElementById('engine-feedback');
  const btn = document.getElementById('opt-'+i);
  if(opt.correct){
    st.locked = true;
    btn.classList.add('correct');
    feedArea.innerHTML = `<div class="feedback">🏆 Nice! You leveled up!</div>`;
    setTimeout(()=>{
      st.idx++; st.tries=0;
      if(st.idx >= st.deck.length){ if(st.onDeckComplete) st.onDeckComplete(); }
      else { renderEngineCard(); }
    }, 1000);
  } else {
    btn.classList.add('wrong');
    st.tries++;
    if(st.tries >= 4){
      st.locked = true;
      feedArea.innerHTML = `<div class="hint-box">💪 Great effort! Here's the answer: <b>${item.options.find(o=>o.correct).label}</b><br>${item.explain}</div>
      <button class="big-btn green" style="margin-top:12px;" onclick="engineConfirm()">Got it! Keep going ➡️</button>`;
    } else {
      feedArea.innerHTML = `<div class="hint-box">💡 Hint ${st.tries}: ${item.hints[Math.min(st.tries-1, item.hints.length-1)]}</div>`;
      document.getElementById('engine-dots').innerHTML = [0,1,2,3].map(i=>`<span class="${i < st.tries ? 'used':''}"></span>`).join('');
    }
  }
}
function engineConfirm(){
  const st = engineState;
  st.idx++; st.tries=0;
  if(st.idx >= st.deck.length){ if(st.onDeckComplete) st.onDeckComplete(); }
  else { renderEngineCard(); }
}
function engineFrameHTML(tag){
  return `<div class="stage">

    <div id="engine-progress" class="sub" style="margin-top:8px;">Card 1</div>

    <div class="opt-grid" id="engine-opts"></div>

}

function numOptions(correct, spread){
  const distractors = pickDistinct(Array.from({length:30},(_,i)=>i), correct, 3).filter(x=>x>=0);
  let pool = [];
  for(let i=1;i<=6;i++){ if(correct-i>=0) pool.push(correct-i); pool.push(correct+i); }
  pool = shuffle([...new Set(pool)]).slice(0,3);
  while(pool.length<3){ pool.push(correct + pool.length + 4); }
  return shuffle([{label:String(correct),correct:true}, ...pool.map(x=>({label:String(x),correct:false}))]);
}

   WRITING GYM (traces 3-5 words per day, each requiring a
   high-accuracy trace before advancing to the next word)

var writeState = {};
function writeHTML(d){
  const words = focusForDay(d).sightSet;
  return activityHeader(d, `✏️ Writing Gym`) +
  `<p class="sub">Trace each word carefully — aim for 95-100% accuracy to earn a gold star on every word!</p>
  <div class="stage">

    <div class="flash-caption" id="write-word-label" style="margin-top:8px;"></div>
    <canvas class="trace-canvas" id="traceCanvas" width="360" height="260"></canvas>
    <div class="trace-controls">
      <button class="small-btn" onclick="clearTrace()">🧽 Clear</button>
      <button class="big-btn green" style="width:auto;" onclick="checkTrace(${d})">✅ Check My Tracing!</button>
    </div>
    <div id="write-feedback" style="margin-top:14px;"></div>
  </div>
  </div>`;
}
function initTraceCanvas(d){
  const canvas = document.getElementById('traceCanvas');
  if(!canvas) return;
  const ctx2d = canvas.getContext('2d');
  window._traceCanvas = canvas;

  function currentWord(){ return writeState.words[writeState.idx]; }
  function fontSizeFor(word){ return word.length > 6 ? 46 : (word.length > 4 ? 60 : 84); }
  function drawGuide(){
    const word = currentWord();
    ctx2d.clearRect(0,0,canvas.width,canvas.height);
    ctx2d.font = `bold ${fontSizeFor(word)}px "Baloo 2", sans-serif`;
    ctx2d.fillStyle = '#dbe8ff';
    ctx2d.textAlign='center';
    ctx2d.textBaseline='middle';
    ctx2d.fillText(word, canvas.width/2, canvas.height/2+10);
  }
  window._drawTraceGuide = drawGuide;
  window._fontSizeFor = fontSizeFor;

  ctx2d.strokeStyle = '#1E6FFF';
  ctx2d.lineWidth = 7;
  ctx2d.lineCap = 'round';
  let drawing=false;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {x:(clientX-rect.left)*scaleX, y:(clientY-rect.top)*scaleY};
  }
  function start(e){ drawing=true; const p=pos(e); ctx2d.beginPath(); ctx2d.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){ if(!drawing) return; const p=pos(e); ctx2d.lineTo(p.x,p.y); ctx2d.stroke(); e.preventDefault(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
  window.clearTrace = function(){ drawGuide(); };

  startWriting(d);
}
function startWriting(d){
  writeState = {day:d, words: focusForDay(d).sightSet, idx:0, attempts:0};
  loadWriteWord();
}
function loadWriteWord(){
  const w = writeState.words[writeState.idx];
  const progEl = document.getElementById('write-progress');
  const labelEl = document.getElementById('write-word-label');
  const feedEl = document.getElementById('write-feedback');
  if(progEl) progEl.innerText = `Word ${writeState.idx+1} of ${writeState.words.length}`;
  if(labelEl) labelEl.innerText = `Trace: "${w}"`;
  if(feedEl) feedEl.innerHTML = '';
  writeState.attempts = 0;
  if(window._drawTraceGuide) window._drawTraceGuide();
}
/* Pixel-based accuracy check: renders the guide word to an offscreen
   canvas, compares it against the child's ink strokes, and scores both
   how much of the letter shape got covered and how much stray ink there
   was outside the letters — combined into one accuracy percentage. */
function computeTraceAccuracy(canvas, word, fontSize){
  const w = canvas.width, h = canvas.height;
  const guideCanvas = document.createElement('canvas');
  guideCanvas.width = w; guideCanvas.height = h;
  const gctx = guideCanvas.getContext('2d');
  gctx.font = `bold ${fontSize}px "Baloo 2", sans-serif`;
  gctx.textAlign='center'; gctx.textBaseline='middle';
  gctx.fillStyle = '#000';
  gctx.fillText(word, w/2, h/2+10);
  const guideData = gctx.getImageData(0,0,w,h).data;

  const uctx = canvas.getContext('2d');
  const userData = uctx.getImageData(0,0,w,h).data;

  const guidePixels = [];
  const inkPixels = [];
  for(let i=0;i<w*h;i++){
    if(guideData[i*4+3] > 40) guidePixels.push(i);
    const r = userData[i*4], g = userData[i*4+1], b = userData[i*4+2];
    if(b > 140 && b > r + 30 && b > g + 10) inkPixels.push(i);
  }
  if(guidePixels.length === 0 || inkPixels.length === 0) return {score:0, coverage:0, accuracy:0};

  const R = 7;
  const guideTol = dilateSet(guidePixels, w, h, R);
  const inkTol = dilateSet(inkPixels, w, h, R);

  let covered = 0;
  for(const idx of guidePixels){ if(inkTol.has(idx)) covered++; }
  const coverage = covered / guidePixels.length;

  let accurate = 0;
  for(const idx of inkPixels){ if(guideTol.has(idx)) accurate++; }
  const accuracy = accurate / inkPixels.length;

  const score = Math.round(Math.min(100, (coverage*0.6 + accuracy*0.4) * 100));
  return {score, coverage:Math.round(coverage*100), accuracy:Math.round(accuracy*100)};
}
function dilateSet(pixels, w, h, R){
  const set = new Set();
  const R2 = R*R;
  for(const idx of pixels){
    const x = idx % w, y = (idx / w) | 0;
    for(let dy=-R; dy<=R; dy++){
      const ny = y+dy; if(ny<0||ny>=h) continue;
      const rowBase = ny*w;
      for(let dx=-R; dx<=R; dx++){
        if(dx*dx+dy*dy > R2) continue;
        const nx = x+dx; if(nx<0||nx>=w) continue;
        set.add(rowBase+nx);
      }
    }
  }
  return set;
}
function checkTrace(d){
  const canvas = window._traceCanvas;
  if(!canvas) return;
  const word = writeState.words[writeState.idx];
  const fontSize = window._fontSizeFor ? window._fontSizeFor(word) : 80;
  const result = computeTraceAccuracy(canvas, word, fontSize);
  writeState.attempts++;
  const feedEl = document.getElementById('write-feedback');
  if(result.score >= 95){
    feedEl.innerHTML = `<div class="hint-box" style="background:#eafaf0;border-color:#b8f0cf;color:#1d7a4a;">🌟 Amazing! ${result.score}% accuracy — that's a perfect trace!</div>
    <button class="big-btn green" style="margin-top:10px;width:auto;" onclick="nextWriteWord(${d})">Next Word ➡️</button>`;
  } else if(result.score >= 90){
    feedEl.innerHTML = `<div class="hint-box" style="background:#eafaf0;border-color:#b8f0cf;color:#1d7a4a;">🎉 Great job! ${result.score}% accuracy — nice tracing!</div>
    <button class="big-btn green" style="margin-top:10px;width:auto;" onclick="nextWriteWord(${d})">Next Word ➡️</button>`;
  } else if(writeState.attempts >= 3){
    feedEl.innerHTML = `<div class="hint-box">💪 Nice effort — ${result.score}% this time! Let's move on and we'll practice this word again soon.</div>
    <button class="big-btn green" style="margin-top:10px;width:auto;" onclick="nextWriteWord(${d})">Continue ➡️</button>`;
  } else {
    feedEl.innerHTML = `<div class="hint-box">✏️ You got ${result.score}% — so close! Trace slowly, right on top of the pale letters. (Attempt ${writeState.attempts} of 3)</div>
    <button class="small-btn" style="margin-top:10px;" onclick="clearTrace()">🧽 Clear &amp; Try Again</button>`;
  }
}
function nextWriteWord(d){
  writeState.idx++;
  if(writeState.idx >= writeState.words.length){
    markSectionComplete(d,'write');
    goto('day',{day:d});
  } else {
    loadWriteWord();
  }
}

/* =========================================================
   MEMORY MATCH
   Adaptive difficulty (more pairs as days progress, nudged by
   how fast/accurate the previous day's game was), a live timer,
   and an extra "fireworks" celebration when Joseph beats his
   personal best time for that difficulty level.
   ========================================================= */
var memState = {};
const MEMORY_SYMBOL_POOL = ['🎮','🔤','⚡','🎯','⭐','💰','🏁','🍄','🚀','🏆'];
function pairsForDay(d){
  // Baseline trends upward across the 14 days: 4 pairs early, up to 8 by the end.
  const base = Math.min(8, 4 + Math.floor((d-1)/3));
  // Nudge based on how the previous day's memory game went.
  const prev = state.memoryHistory && state.memoryHistory[d-1];
  let adj = 0;
  if(prev){
    if(prev.rating === 'fast') adj = 1;
    else if(prev.rating === 'slow') adj = -1;
  }
  return Math.max(4, Math.min(8, base + adj));
}
function parTimeSeconds(pairs){ return pairs * 6; }
function memoryHTML(d){
  return activityHeader(d, `🧠 Memory Match`) +
  `<p class="sub">Flip two cards and find the matching pairs — try to beat your best time!</p>
  <div class="stage">
    <div style="display:flex;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;">
      <div class="pill" id="mem-timer">⏱️ 0:00</div>
      <div class="pill" id="mem-tries" style="background:#ffe9d6;color:#b5540a;">🔄 0 tries</div>
    </div>
    <div class="memgrid" id="memgrid"></div>
    <div id="memWin" style="margin-top:14px;"></div>
  </div>
  </div>`;
}
function initMemoryGame(d){
  const pairs = pairsForDay(d);
  const symbols = MEMORY_SYMBOL_POOL.slice(0, pairs);
  let cards = shuffle([...symbols, ...symbols]).map((s,i)=>({id:i, val:s, flipped:false, matched:false}));
  const cols = pairs <= 4 ? 4 : (pairs <= 6 ? 4 : 5);
  const grid = document.getElementById('memgrid');
  if(grid) grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  memState = {cards, first:null, second:null, lock:false, dayNum:d, pairs, mistakes:0, startTime:Date.now(), timerId:null, finished:false};
  memState.timerId = setInterval(updateMemTimer, 1000);
  renderMemGrid();
}
function updateMemTimer(){
  if(!memState || memState.finished) return;
  const el = document.getElementById('mem-timer');
  if(!el) return;
  const secs = Math.floor((Date.now()-memState.startTime)/1000);
  const m = Math.floor(secs/60), s = secs%60;
  el.innerText = `⏱️ ${m}:${s<10?'0':''}${s}`;
}
function renderMemGrid(){
  const grid = document.getElementById('memgrid');
  if(!grid) return;
  grid.innerHTML = memState.cards.map(c=>`<div class="memcard ${c.flipped||c.matched?'flipped':''} ${c.matched?'matched':''}" onclick="flipMem(${c.id})">${(c.flipped||c.matched) ? c.val : '<span style="font-family: Baloo 2, sans-serif; font-weight:800;">?</span>'}</div>`).join('');
  const triesEl = document.getElementById('mem-tries');
  if(triesEl) triesEl.innerText = `🔄 ${memState.mistakes} ${memState.mistakes===1?'try':'tries'}`;
  if(memState.cards.every(c=>c.matched) && !memState.finished){
    completeMemoryGame();
  }
}
function flipMem(id){
  if(memState.lock || memState.finished) return;
  const c = memState.cards.find(x=>x.id===id);
  if(c.flipped||c.matched) return;
  c.flipped = true;
  if(!memState.first){ memState.first = c; }
  else if(!memState.second){
    memState.second = c;
    memState.lock = true;
    renderMemGrid();
    setTimeout(()=>{
      if(memState.first.val === memState.second.val){ memState.first.matched = true; memState.second.matched = true; }
      else { memState.first.flipped = false; memState.second.flipped = false; memState.mistakes++; }
      memState.first = null; memState.second=null; memState.lock=false;
      renderMemGrid();
    }, 700);
    return;
  }
  renderMemGrid();
}
function completeMemoryGame(){
  memState.finished = true;
  if(memState.timerId) clearInterval(memState.timerId);
  const elapsed = Math.round((Date.now()-memState.startTime)/1000);
  const pairs = memState.pairs;
  const par = parTimeSeconds(pairs);
  const mistakesPar = pairs;

  let rating = 'steady';
  if(elapsed <= par*0.75 && memState.mistakes <= mistakesPar*0.5) rating = 'fast';
  else if(elapsed >= par*1.4 || memState.mistakes >= mistakesPar*1.5) rating = 'slow';

  if(!state.memoryHistory) state.memoryHistory = {};
  if(!state.memoryBestTimes) state.memoryBestTimes = {};
  state.memoryHistory[memState.dayNum] = {pairs, timeSec:elapsed, mistakes:memState.mistakes, rating};

  const prevBest = state.memoryBestTimes[pairs];
  const isNewRecord = (prevBest === undefined) || (elapsed < prevBest);
  if(isNewRecord) state.memoryBestTimes[pairs] = elapsed;
  save();

  const m = Math.floor(elapsed/60), s = elapsed%60;
  const timeStr = `${m}:${s<10?'0':''}${s}`;

  let message, headline;
  if(isNewRecord && prevBest !== undefined){
    headline = '🎆 NEW RECORD! 🎆';
    message = `You finished in ${timeStr} — faster than your best time ever at this level! Joseph's memory is getting SO sharp!`;
    launchFireworks();
  } else if(rating === 'fast'){
    headline = '🌟 Lightning Fast!';
    message = `${timeStr} with only ${memState.mistakes} ${memState.mistakes===1?'try':'tries'} — amazing focus!`;
    launchConfetti();
  } else if(rating === 'slow'){
    headline = '💪 You Did It!';
    message = `You finished in ${timeStr}. Memory games get easier with practice — Joseph is building his brain muscles!`;
    launchConfetti();
  } else {
    headline = '🏆 Great Job!';
    message = `You finished in ${timeStr} with ${memState.mistakes} ${memState.mistakes===1?'try':'tries'}. Nice steady focus!`;
    launchConfetti();
  }

  document.getElementById('memWin').innerHTML = `
    <div class="feedback">${headline}</div>
    <p class="sub" style="margin-top:4px;">${message}</p>
    <button class="big-btn green" style="margin-top:10px;" onclick="finishMemory(${memState.dayNum})">Continue ➡️</button>`;
}
function launchFireworks(){
  // A bigger, multi-burst celebration for beating a personal best.
  launchConfetti();
  setTimeout(()=>launchConfetti(), 350);
  setTimeout(()=>launchConfetti(), 700);
}
function finishMemory(d){ markSectionComplete(d,'memory'); goto('day',{day:d}); }

/* =========================================================
   BOSS QUIZ (mixed review of the day)
   ========================================================= */
function quizHTML(d){
  return activityHeader(d, `🏆 Boss Quiz`) +
    `<p class="sub">Beat today's boss level with everything you learned!</p>
    ${engineFrameHTML('Boss Quiz')}
    </div>`;
}
function buildQuizDeck(d){
  const mathDeck = buildMathDeck(d);
  const readDeck = buildReadingDeck(d);
  const sight = focusForDay(d).sightSet[0];
  const others = pickDistinct(['the','I','see','go','can','like','look','we','you','my'], sight, 3);
  return [
    mathDeck[0],
    readDeck[0],
    { tier:'Sight Word', stageHTML:`<div class="flash-big-letter" style="font-size:60px;">${sight}</div><div class="flash-caption">Read this sight word!</div>`,
      options: shuffle([{label:sight,correct:true}, ...others.map(o=>({label:o,correct:false}))]),
      hints:[`Sound it out.`,`This is today's featured word.`,`It's "${sight}."`], explain:`"${sight}" is today's sight word.` },
    mathDeck[1],
    readDeck[1]
  ];
}

/* =========================================================
   STORY TIME (Reading Corner)
   ========================================================= */
function storyHTML(dOrNull){
  const d = dOrNull;
  const book = bookForDay(d);
  const dayIdxInBook = book.days.indexOf(d);
  const stageOptions = ['📖 Picture Walk', '📝 Vocabulary', '⭐ Favorite Moment', '💬 Discussion & Game'];
  const stageTitle = stageOptions[dayIdxInBook % stageOptions.length];
  let body = '';
  if(stageTitle.includes('Picture Walk')){
    body = `<p>${book.summary}</p><h4>🎨 Try this:</h4><p>${book.activity}</p>`;
  } else if(stageTitle.includes('Vocabulary')){
    body = `<h4>New words to learn:</h4><div>${book.vocab.map(v=>`<span class="vocab-chip">${v}</span>`).join('')}</div>
    <h4 style="margin-top:14px;">Fun Facts</h4><ul class="fun-list">${book.funFacts.map(f=>`<li>${f}</li>`).join('')}</ul>`;
  } else if(stageTitle.includes('Favorite')){
    body = `<p><b>Our favorite moment:</b> ${book.moment}</p><h4>💛 Big Idea</h4><p>${book.lesson}</p>`;
  } else {
    body = `<h4>Let's talk about it!</h4><ul class="fun-list">${book.discussion.map(q=>`<li>${q}</li>`).join('')}</ul>`;
  }
  return activityHeader(d, `📖 Story Time`) +
  `<div class="book-cover"><div class="emoji">${book.emoji}</div><h3 style="margin:6px 0 2px;">${book.title}</h3><p class="sub" style="margin:0;">by ${book.author}</p></div>
  <div class="hint-box" style="text-align:left;">
    🎬 <b>Watch a read-aloud together:</b> <a href="${book.videoUrl}" target="_blank" rel="noopener">${book.videoLabel}</a><br>
    <span style="font-size:12px;">(Please preview with Joseph — every video is picked from a kid-focused read-aloud channel, but it's always good to watch together!)</span><br><br>
    📱 <b>Want the real book?</b> Borrow the ebook or audiobook free from your local library using the <b>Libby</b> app (by OverDrive) — just search "${book.title}."
  </div>
  <p class="pill" style="margin-top:12px;">${stageTitle}</p>
  <div style="margin-top:10px;">${body}</div>
  <button class="big-btn gold" style="margin-top:18px;" onclick="markSectionComplete(${d},'story'); goto('day',{day:${d}});">✅ Finished Story Time!</button>
  </div>`;
}

/* =========================================================
   VIDEO LEARNING (per-day, gated — required to unlock next day,
   with an interactive recap the child answers after watching)
   ========================================================= */
function videoHTML(d){
  const f = focusForDay(d);
  const mv = MATH_VIDEOS[f.mathTopic];
  const rv = READ_VIDEOS[f.readTopic];
  const notes = getVideoNotes(d);
  const bothWatched = !!(notes.mathWatched && notes.readWatched);
  const mcOptions = ['Yes, easily!','Yes, with a little help','I need more practice'];
  return activityHeader(d, `🎬 Video Learning`) +
  `<p class="sub">Watch both videos with a grown-up, then answer the questions below!</p>
  <div class="stage" style="text-align:left;">
    <h3 style="margin-top:0;">🔢 Math Video: ${mathTopicLabel(f.mathTopic)}</h3>
    <p>▶️ <a href="${mv.url}" target="_blank" rel="noopener"><b>${mv.title}</b></a> <span class="pill">${mv.channel}</span></p>
    <label style="display:flex;align-items:center;gap:8px;margin:10px 0;font-weight:700;">
      <input type="checkbox" ${notes.mathWatched?'checked':''} onchange="toggleWatched(${d},'math',this.checked)" style="width:20px;height:20px;"> I watched the math video!
    </label>

    <h3 style="margin-top:20px;">🔤 Reading Video: ${readTopicLabel(f.readTopic)}</h3>
    <p>▶️ <a href="${rv.url}" target="_blank" rel="noopener"><b>${rv.title}</b></a> <span class="pill">${rv.channel}</span></p>
    <label style="display:flex;align-items:center;gap:8px;margin:10px 0;font-weight:700;">
      <input type="checkbox" ${notes.readWatched?'checked':''} onchange="toggleWatched(${d},'read',this.checked)" style="width:20px;height:20px;"> I watched the reading video!
    </label>

    <h3 style="margin-top:20px;">💬 Let's Talk About It!</h3>
    <p class="sub">Answer together — tap a choice or type Joseph's own words. Everything saves automatically.</p>

    <div style="margin-top:12px;">
      <p style="font-weight:700;">Can you show me an example?</p>
      <div class="opt-grid" style="grid-template-columns:1fr 1fr;">
        ${mcOptions.map(opt=>`<button class="opt-btn ${notes.q1===opt?'correct':''}" style="font-size:13px;padding:12px 6px;" onclick="saveVideoAnswer(${d},'q1','${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
      </div>
    </div>

    <div style="margin-top:18px;">
      <p style="font-weight:700;">What was the trick they used?</p>
      <textarea rows="2" style="width:100%;border-radius:12px;border:2px solid #dbe8ff;padding:10px;font-family:'Quicksand',sans-serif;font-size:14px;" placeholder="Type what Joseph remembers..." onchange="saveVideoAnswer(${d},'q2',this.value)">${notes.q2||''}</textarea>
    </div>

    <div style="margin-top:16px;">
      <p style="font-weight:700;">Can you explain it back to me?</p>
      <textarea rows="3" style="width:100%;border-radius:12px;border:2px solid #dbe8ff;padding:10px;font-family:'Quicksand',sans-serif;font-size:14px;" placeholder="Type Joseph's explanation here..." onchange="saveVideoAnswer(${d},'q3',this.value)">${notes.q3||''}</textarea>
    </div>

    <button class="big-btn blue" style="margin-top:18px;" onclick="finishVideoActivity(${d})" ${bothWatched?'':'disabled'}>✅ Finished Video Learning!</button>
    ${bothWatched ? '' : '<p class="sub" style="margin-top:8px;">Check off both videos above to unlock the finish button.</p>'}
  </div>
  </div>`;
}
function toggleWatched(d, which, checked){
  const notes = getVideoNotes(d);
  if(which==='math') notes.mathWatched = checked; else notes.readWatched = checked;
  save();
  goto('video', {day:d});
}
function saveVideoAnswer(d, key, value){
  const notes = getVideoNotes(d);
  notes[key] = value;
  save();
  if(key==='q1'){ goto('video', {day:d}); }
}
function finishVideoActivity(d){
  markSectionComplete(d, 'video');
  goto('day', {day:d});
}

/* =========================================================
   REWARDS
   ========================================================= */
function rewardsHTML(){
  const earned = state.stickers;
  let wall = '';
  for(let i=0;i<Math.max(earned.length, 12); i++){
    if(i < earned.length) wall += `<div class="sticker">${earned[i]}</div>`;
    else wall += `<div class="sticker locked">🔒</div>`;
  }
  const completedDays = Object.values(state.days).filter(d=>d.complete).length;
  return `<div class="card">
    <h2>🏆 My Rewards</h2>
    <p class="sub">${state.coins} coins earned · ${earned.length} badges collected · ${completedDays}/14 days complete</p>
    <div class="sticker-wall">${wall}</div>
  </div>
  <div class="card">
    <h2>🎓 Certificate</h2>
    <p class="sub">${completedDays >= 14 ? "You beat the whole academy! Print your certificate below." : "Finish all 14 days to unlock your printable certificate!"}</p>
    <div style="border:6px double #1E6FFF;border-radius:18px;padding:24px;text-align:center;background:#f7faff;">
      <div style="font-size:40px;">🏆</div>
      <h2 style="margin:8px 0 0;">Certificate of Achievement</h2>
      <p style="margin:6px 0;">This certifies that</p>
      <h2 style="color:var(--red-deep);margin:0;">Joseph Hodges VI</h2>
      <p style="margin:10px 0 0;">completed the Turbo Quest Academy<br>Kindergarten Review &amp; 1st Grade Readiness Program</p>
    </div>
    <button class="big-btn blue" style="margin-top:14px;" onclick="window.print()" ${completedDays>=14?'':'disabled'}>🖨️ Print Certificate</button>
  </div>`;
}

/* =========================================================
   PARENT DASHBOARD
   ========================================================= */
function parentHTML(){
  const completedDays = Object.values(state.days).filter(d=>d.complete).length;
  let totalActs=0, doneActs=0;
  for(let d=1;d<=14;d++){ const s=dayState(d); ALL_SECTIONS.forEach(k=>{totalActs++; if(s[k]) doneActs++;}); }
  const subjects = [
    {label:'Math Mission', pct: pctFor('math'), color:'#1E6FFF'},
    {label:'Phonics & Reading', pct: pctFor('reading'), color:'#EE3B32'},
    {label:'Sight Words', pct: pctFor('sight'), color:'#FFC72C'},
    {label:'Number Sense', pct: pctFor('ninja'), color:'#22B24C'},
    {label:'Writing', pct: pctFor('write'), color:'#7B4FE0'},
    {label:'Comprehension', pct: pctFor('story'), color:'#00D4FF'},
    {label:'Video Learning', pct: pctFor('video'), color:'#FF6B00'}
  ];
  function pctFor(key){ let done=0, tot=0; for(let d=1; d<=14; d++){ tot++; if(dayState(d)[key]) done++; } return Math.round((done/tot)*100); }
  return `<div class="card">
    <h2>👨 Parent Dashboard</h2>
    <p class="sub">${completedDays}/14 days complete · ${doneActs}/${totalActs} activities complete · ${state.coins} total coins</p>
    <div class="progressbar"><div style="width:${Math.round((doneActs/totalActs)*100)}%"></div></div>
    <h3 style="margin-top:20px;">Mastery by Subject</h3>
    ${subjects.map(s=>`<div class="bar-row"><div class="lbl"><span>${s.label}</span><span>${s.pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${s.pct}%;background:${s.color};"></div></div></div>`).join('')}
    <h3 style="margin-top:20px;">Confidence Meter</h3>
    <p class="sub">${confidenceMessage(doneActs/totalActs)}</p>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
      <button class="small-btn" onclick="resetProgress()">🔄 Reset All Progress</button>
      <button class="small-btn" onclick="unlockAllDays()">🔓 Unlock All Days</button>
    </div>
  </div>
  <div class="card">
    <h2>📋 Skills Covered (K Review → 1st Grade Stretch)</h2>
    <ul class="fun-list">
      <li><b>Math:</b> counting/number sense to 20+, addition &amp; subtraction within 20, shapes (2D &amp; 3D) &amp; colors, patterns, skip counting by 2s/5s/10s, place value (tens &amp; ones), telling time to the hour/half-hour, measurement, and money (1st grade stretch)</li>
      <li><b>Reading:</b> CVC words, rhyming, consonant blends, digraphs, silent-e (CVCe) words, long vowel teams, compound words, contractions, and reading comprehension with literal &amp; inferential questions</li>
      <li><b>Sight words:</b> rotating daily practice across Pre-Primer through 1st grade Dolch word sets</li>
      <li><b>Fine motor:</b> daily handwriting practice tracing sight words</li>
      <li><b>Confidence building:</b> every activity uses hints before answers, positive reinforcement, and adaptive difficulty so Joseph is always appropriately challenged — never bored, never frustrated</li>
    </ul>
    <p class="sub" style="margin-top:10px;">Each Math Mission and Phonics Power-Up has 3 tiers: getting a card right unlocks a harder one, so Joseph is automatically challenged past kindergarten review and into 1st grade thinking when he's ready.</p>
  </div>`;
}
function confidenceMessage(ratio){
  if(ratio >= 0.9) return "Joseph is showing excellent mastery and confidence — he's more than ready for 1st grade! 🏆";
  if(ratio >= 0.5) return "Great momentum! He's building strong review skills and starting to tackle 1st grade challenges.";
  return "Just getting started — little and often works best. Aim for one section a day!";
}
function resetProgress(){
  if(confirm("This clears all of Joseph's progress. Are you sure?")){ state = defaultState(); save(); goto('home'); }
}
function unlockAllDays(){ state.unlockedDay = 14; save(); goto('home'); }

/* =========================================================
   CELEBRATION MODAL
   ========================================================= */
function showCelebration(d){
  launchConfetti();
  const overlay = document.createElement('div');
  overlay.className='overlay';
  overlay.innerHTML = `<div class="modal">
    <div class="big-emoji">🏁🏆⭐</div>
    <h2>Day ${d} Complete!</h2>
    <p>Joseph earned 5 bonus coins and a new badge! Time for a victory dance! 🎉</p>
    <button class="big-btn" onclick="this.closest('.overlay').remove(); goto('${d<14?'day':'rewards'}'${d<14?`,{day:${Math.min(d+1,14)}}`:''});">${d<14 ? 'Next Level ➡️' : 'See My Rewards 🏆'}</button>
  </div>`;
  document.body.appendChild(overlay);
}

/* =========================================================
   INIT
   ========================================================= */
render('home');
</script>
</body>
</html>
