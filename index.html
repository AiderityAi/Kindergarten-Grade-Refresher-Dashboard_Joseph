<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1E6FFF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Joseph's Turbo Quest Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@500;600;700&family=Andika:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1E6FFF;
  --blue-deep:#0A47C2;
  --cyan:#00D4FF;
  --red:#EE3B32;
  --red-deep:#C41E17;
  --gold:#FFC72C;
  --gold-deep:#E0A400;
  --green:#22B24C;
  --green-deep:#178A38;
  --purple:#7B4FE0;
  --brown:#8B5A2B;
  --obsidian:#1B1F3B;
  --dark:#12163A;
  --dark-soft:#4A5080;
  --cream:#F2F7FF;
  --white:#FFFFFF;
  --shadow: 0 8px 0 rgba(18,22,58,0.18);
  --radius: 26px;
  --speed: repeating-linear-gradient(
    90deg,
    var(--green)      0   8%,
    var(--green-deep) 8%  16%,
    var(--blue)        16% 24%,
    var(--blue-deep)   24% 32%,
    var(--gold)         32% 40%,
    var(--brown)        40% 48%,
    var(--red)           48% 56%,
    var(--purple)        56% 64%,
    var(--cyan)           64% 72%,
    var(--obsidian)        72% 80%,
    var(--green)            80% 88%,
    var(--blue)              88% 96%,
    var(--gold)               96% 100%
  );
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{
  font-family:'Quicksand',sans-serif;
  background:
    radial-gradient(circle at 6% 10%, rgba(30,111,255,0.16) 0%, transparent 40%),
    radial-gradient(circle at 94% 8%, rgba(238,59,50,0.14) 0%, transparent 40%),
    radial-gradient(circle at 12% 90%, rgba(255,199,44,0.18) 0%, transparent 42%),
    radial-gradient(circle at 90% 90%, rgba(123,79,224,0.16) 0%, transparent 42%),
    radial-gradient(circle at 50% 50%, rgba(0,212,255,0.08) 0%, transparent 55%),
    var(--cream);
  color:var(--dark);
  min-height:100vh;
  min-height:100dvh;
  -webkit-tap-highlight-color: transparent;
  position:relative;
  overflow-x:hidden;
}
body::before{
  content:'⭐  🍄  💰  ⚡  🏁  ⭐  🍄  💰  ⚡  🏁';
  position:fixed;inset:-40px auto auto -20px;width:140%;
  font-size:26px;line-height:3.4;letter-spacing:22px;
  opacity:0.06;color:var(--blue-deep);
  pointer-events:none;z-index:0;white-space:pre-wrap;transform:rotate(-6deg);
}
body::after{
  content:'🏁  ⚡  💰  🍄  ⭐  🏁  ⚡  💰  🍄  ⭐';
  position:fixed;inset:auto -20px -40px auto;width:140%;
  font-size:26px;line-height:3.4;letter-spacing:22px;
  opacity:0.06;color:var(--red-deep);
  pointer-events:none;z-index:0;white-space:pre-wrap;transform:rotate(-6deg);
}
h1,h2,h3,h4,.display{font-family:'Baloo 2',cursive;}
button{font-family:'Quicksand',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
button:focus-visible,a:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px;}
.app{
  max-width:900px;margin:0 auto;position:relative;z-index:1;
  padding-top:16px;
  padding-bottom:max(60px, env(safe-area-inset-bottom));
  padding-left:max(16px, env(safe-area-inset-left));
  padding-right:max(16px, env(safe-area-inset-right));
}
.speed-strip{height:8px;border-radius:8px;background:var(--speed);background-size:200% 100%;margin-bottom:14px;animation:speedmove 5s linear infinite;}
@keyframes speedmove{0%{background-position:0% 0;}100%{background-position:200% 0;}}

/* ---------- RESPONSIVE: PHONES, TABLETS, IPADS ---------- */
/* Comfortable, larger-format layout for tablets/iPads in portrait & landscape */
@media(min-width:700px){
  .app{padding-top:24px;}
  .card{padding:28px;}
  .section-grid{grid-template-columns:1fr 1fr;gap:16px;}
  .month-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:18px;}
  .opt-grid{grid-template-columns:1fr 1fr;gap:16px;}
  .stage{padding:32px;}
}
@media(min-width:1000px){
  .app{max-width:960px;}
}
/* Short/landscape viewports (phones rotated, small tablets) — trim vertical padding
   so key controls (options, buttons) stay reachable without excess scrolling */
@media(max-height:480px) and (orientation:landscape){
  .app{padding-top:8px;}
  .card{padding:14px;}
  .stage{padding:14px;}
  .mascot-row{margin:2px 0 10px;}
  .mascot-row span{width:48px;height:48px;font-size:26px;}
  .flash-emoji{font-size:56px;}
  .flash-big-letter{font-size:64px;}
}
/* Extra-small phones (SE-class, ~360px and under) */
@media(max-width:360px){
  .card{padding:16px;}
  .big-btn{font-size:15px;padding:14px 16px;}
  .flash-big-letter{font-size:76px;}
}
/* Ensure every tappable control meets a comfortable minimum touch target */
.big-btn,.small-btn,.day-nav-btn,.opt-btn,.backbtn,nav.tabs button,.month-card,.level-node{min-height:44px;}
input[type="checkbox"]{min-width:22px;min-height:22px;}
/* Prevent iOS Safari from auto-zooming when a text field is focused */
textarea,input[type="text"],input[type="checkbox"]{font-size:16px;}

/* ---------- HEADER / NAV ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--white);
  border-radius:24px;
  border:3px solid #dbe8ff;
  padding:12px 18px;
  box-shadow:var(--shadow);
  margin-bottom:16px;
  gap:10px;flex-wrap:wrap;
  position:relative;
}
.topbar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:7px;border-radius:24px 24px 0 0;
  background:var(--speed);background-size:200% 100%;animation:speedmove 5s linear infinite;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-badge{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--red));
  display:flex;align-items:center;justify-content:center;font-size:24px;
  box-shadow:0 4px 0 rgba(0,0,0,0.15);
  border:3px solid white;outline:2px solid #ffe08a;
}
.brand-text{line-height:1.05;}
.brand-text .t1{font-size:12px;color:var(--red-deep);font-weight:800;letter-spacing:0.5px;}
.brand-text .t2{font-size:19px;font-weight:800;background:linear-gradient(90deg,var(--blue-deep),var(--red-deep));-webkit-background-clip:text;background-clip:text;color:transparent;}
.coin-counter{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#fff2c9,#ffe090);
  border-radius:20px;padding:8px 14px;font-weight:800;color:#8a5c00;
  font-family:'Baloo 2',cursive;font-size:16px;border:2px solid #ffdc8a;
}
nav.tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 12px;margin-bottom:6px;scrollbar-width:none;}
nav.tabs::-webkit-scrollbar{display:none;}
nav.tabs button{
  flex:0 0 auto;border:none;border-radius:18px;padding:10px 16px;
  background:var(--white);color:var(--dark-soft);font-weight:700;font-size:14px;
  box-shadow:0 4px 0 rgba(18,22,58,0.08);transition:transform .12s ease;
  border:2px solid #e4edff;
}
nav.tabs button.active{
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));
  color:white;box-shadow:0 4px 0 rgba(18,22,58,0.25);border-color:transparent;
}
nav.tabs button:active{transform:translateY(2px);}

/* ---------- CARDS ---------- */
.card{
  background:var(--white);border-radius:var(--radius);padding:22px;
  box-shadow:var(--shadow);margin-bottom:18px;position:relative;
  border:3px solid #e4edff;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:6px;border-radius:var(--radius) var(--radius) 0 0;
  background:var(--speed);background-size:200% 100%;animation:speedmove 6s linear infinite;
  border-bottom:2px solid var(--obsidian);
}
.card::after{content:'⭐';position:absolute;top:38px;right:38px;font-size:22px;opacity:0.45;transform:rotate(12deg);}
.card h2{margin:0 0 4px;font-size:24px;}
.card .sub{color:var(--dark-soft);font-size:14px;margin-bottom:14px;font-weight:600;}
.big-btn{
  border:none;border-radius:20px;padding:16px 22px;font-weight:800;font-size:17px;
  color:white;background:linear-gradient(135deg,var(--red),var(--red-deep));
  box-shadow:0 5px 0 rgba(196,30,23,0.4);width:100%;font-family:'Baloo 2',cursive;
  transition:transform .1s ease;
}
.big-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(196,30,23,0.4);}
.big-btn.blue{background:linear-gradient(135deg,var(--blue),var(--blue-deep));box-shadow:0 5px 0 rgba(10,71,194,0.4);}
.big-btn.green{background:linear-gradient(135deg,var(--green),var(--green-deep));box-shadow:0 5px 0 rgba(23,138,56,0.4);}
.big-btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-deep));box-shadow:0 5px 0 rgba(224,164,0,0.4);color:#5c3f00;}
.big-btn.purple{background:linear-gradient(135deg,var(--purple),#5b34b8);box-shadow:0 5px 0 rgba(91,52,184,0.4);}
.big-btn:disabled{opacity:0.4;box-shadow:none;transform:none;}
.pill{display:inline-block;padding:5px 12px;border-radius:14px;font-size:12px;font-weight:800;background:#eaf1ff;color:var(--blue-deep);}
.dictate-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;}
.dictate-row textarea{flex:1;min-width:180px;}
.mic-btn{
  flex:0 0 auto;border:none;border-radius:14px;padding:10px 14px;font-weight:800;font-size:13px;
  background:linear-gradient(135deg,var(--red),var(--red-deep));color:white;font-family:'Baloo 2',cursive;
  box-shadow:0 4px 0 rgba(196,30,23,0.4);min-height:44px;white-space:nowrap;
}
.mic-btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(196,30,23,0.4);}
.mic-btn.listening{animation:micpulse 1s ease-in-out infinite;}
@keyframes micpulse{0%,100%{box-shadow:0 4px 0 rgba(196,30,23,0.4),0 0 0 0 rgba(238,59,50,0.5);}50%{box-shadow:0 4px 0 rgba(196,30,23,0.4),0 0 0 8px rgba(238,59,50,0);}}
.mic-hint{font-size:12px;font-weight:700;color:var(--dark-soft);margin-top:6px;min-height:16px;}
@media(max-width:480px){.dictate-row{flex-direction:column;}.dictate-row textarea{width:100%;}.mic-btn{width:100%;}}
.read-aloud-btn{
  display:inline-flex;align-items:center;gap:6px;margin-left:8px;
  border:2px solid var(--gold);border-radius:16px;padding:6px 14px;
  background:linear-gradient(135deg,#fff9e0,#ffedb0);color:#7a5b00;
  font-weight:800;font-size:13px;font-family:'Baloo 2',cursive;
  box-shadow:0 3px 0 rgba(224,164,0,0.3);min-height:44px;
}
.read-aloud-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(224,164,0,0.3);}

/* ---------- HOME / MONTH MAP / LEVEL PATH ---------- */
.hero-card{background:linear-gradient(160deg,#fff9ec,#eaf3ff 60%,#ffeef2);}
.mascot-row{display:flex;justify-content:center;gap:14px;margin:6px 0 18px;font-size:40px;flex-wrap:wrap;}
.mascot-row span{background:var(--white);border-radius:50%;width:74px;height:74px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);border:3px solid #dbe8ff;outline:2px dashed #cfe0ff;outline-offset:3px;}
.mascot-row span.bob{animation:bob 2.4s ease-in-out infinite;}
.mascot-row span.b1{animation-delay:0s;} .mascot-row span.b2{animation-delay:.15s;} .mascot-row span.b3{animation-delay:.3s;} .mascot-row span.b4{animation-delay:.45s;} .mascot-row span.b5{animation-delay:.6s;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);}30%{transform:translateY(-9px) rotate(-6deg);}60%{transform:translateY(0) rotate(4deg);}}
@media(max-width:420px){.mascot-row{gap:8px;font-size:32px;}.mascot-row span{width:58px;height:58px;}}

.bounce-btn{animation:bouncein .5s ease;}
@keyframes bouncein{0%{transform:scale(0.85);opacity:0;}60%{transform:scale(1.05);opacity:1;}100%{transform:scale(1);}}
.bounce-btn:hover{animation:wiggle .5s ease;}
@keyframes wiggle{0%,100%{transform:rotate(0);}25%{transform:rotate(-2deg) scale(1.02);}75%{transform:rotate(2deg) scale(1.02);}}

.xp-bar{position:relative;height:22px;border-radius:14px;background:#eaf1ff;overflow:hidden;margin:10px 0 4px;border:2px solid #d9e6ff;box-shadow:inset 0 2px 4px rgba(0,0,0,0.08);}
.xp-fill{height:100%;background:var(--speed);background-size:200% 100%;animation:speedmove 4s linear infinite;border-radius:14px;transition:width .5s ease;}
.xp-shine{position:absolute;top:0;left:-40%;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.55),transparent);animation:shinesweep 2.8s ease-in-out infinite;}
@keyframes shinesweep{0%{left:-40%;}100%{left:130%;}}

.progressbar{height:14px;border-radius:10px;background:#eaf1ff;overflow:hidden;margin:8px 0 4px;border:1px solid #d9e6ff;}
.progressbar > div{height:100%;background:var(--speed);background-size:200% 100%;animation:speedmove 4s linear infinite;border-radius:10px;transition:width .4s ease;}

/* Month World Map */
.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;}
.month-card{
  border:3px solid #dbe8ff;border-radius:22px;padding:16px 12px;background:linear-gradient(160deg,#ffffff,#f4f8ff);
  display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;overflow:visible;
  box-shadow:0 5px 0 rgba(30,111,255,0.18);transition:transform .12s ease;
  animation:bouncein .5s ease both;
}
.month-card:active{transform:translateY(3px);}
.month-card.active{border-color:var(--gold);box-shadow:0 5px 0 rgba(224,164,0,0.35),0 0 0 4px rgba(255,199,44,0.25);animation:bouncein .5s ease both, pulseglow 2s ease-in-out infinite;}
@keyframes pulseglow{0%,100%{box-shadow:0 5px 0 rgba(224,164,0,0.35),0 0 0 4px rgba(255,199,44,0.25);}50%{box-shadow:0 5px 0 rgba(224,164,0,0.35),0 0 0 9px rgba(255,199,44,0.08);}}
.month-card.complete{border-color:var(--green);background:linear-gradient(160deg,#f1fdf6,#e3faec);}
.month-card.locked{opacity:0.5;filter:grayscale(0.4);}
.month-trophy{position:absolute;top:-10px;right:-6px;font-size:24px;transform:rotate(12deg);filter:drop-shadow(0 2px 2px rgba(0,0,0,0.2));z-index:2;}
.month-emoji{font-size:38px;}
.month-num{font-family:'Baloo 2',cursive;font-weight:800;font-size:12px;color:var(--blue-deep);letter-spacing:0.5px;text-transform:uppercase;}
.month-title{font-family:'Baloo 2',cursive;font-weight:700;font-size:14px;text-align:center;line-height:1.15;min-height:32px;}
.month-mini-bar{width:100%;height:8px;border-radius:6px;background:#eaf1ff;overflow:hidden;margin-top:2px;}
.month-mini-bar > div{height:100%;background:linear-gradient(90deg,var(--green),var(--mint,#4de8c4));border-radius:6px;}
.month-days-label{font-size:11px;font-weight:700;color:var(--dark-soft);}

/* Level path (inside a Month) */
.level-path{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:0;margin-top:18px;}
.level-node-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
.level-node{
  width:64px;height:64px;border-radius:50%;border:none;
  font-family:'Baloo 2',cursive;font-weight:800;font-size:22px;color:white;
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));
  box-shadow:0 5px 0 rgba(10,71,194,0.4);position:relative;
  animation:bouncein .4s ease both;
}
.level-node-inner{position:relative;z-index:1;}
.level-node.done{background:linear-gradient(135deg,var(--green),var(--green-deep));box-shadow:0 5px 0 rgba(23,138,56,0.4);}
.level-node.today{background:linear-gradient(135deg,var(--red),var(--red-deep));box-shadow:0 5px 0 rgba(196,30,23,0.4);animation:bouncein .4s ease both, pulseglow2 1.6s ease-in-out infinite;}
@keyframes pulseglow2{0%,100%{box-shadow:0 5px 0 rgba(196,30,23,0.4),0 0 0 0 rgba(238,59,50,0.4);}50%{box-shadow:0 5px 0 rgba(196,30,23,0.4),0 0 0 8px rgba(238,59,50,0);}}
.level-node.locked{background:#dbe0ee;color:#9aa3c2;box-shadow:0 5px 0 rgba(154,163,194,0.3);}
.level-node-label{font-size:11px;font-weight:800;color:var(--dark-soft);}
.level-connector{width:26px;height:6px;background:#dbe8ff;border-radius:3px;margin:0 2px 22px;}
@media(max-width:420px){.level-connector{width:14px;}.level-node{width:54px;height:54px;font-size:18px;}}

/* ---------- DAY VIEW / SECTIONS ---------- */
.day-nav-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px;}
.day-nav-row h2{flex:1;text-align:center;font-size:20px;}
.day-nav-btn{
  flex:0 0 auto;border:none;border-radius:14px;padding:10px 12px;font-weight:800;font-size:13px;
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:white;
  box-shadow:0 3px 0 rgba(10,71,194,0.35);font-family:'Baloo 2',cursive;white-space:nowrap;
}
.day-nav-btn:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(10,71,194,0.35);}
.day-nav-btn:disabled{opacity:0.3;box-shadow:none;background:#dbe0ee;color:#9aa3c2;}
@media(max-width:420px){.day-nav-row h2{font-size:16px;}.day-nav-btn{padding:8px 9px;font-size:11px;}}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.section-grid{grid-template-columns:1fr;}}
.section-card{width:100%;text-align:left;font:inherit;border-radius:20px;padding:16px;background:#f7faff;border:2px solid #dbe8ff;display:flex;flex-direction:column;gap:8px;position:relative;transition:transform .12s ease;}
.section-card:active{transform:scale(0.97);}
.section-card.complete{border-color:var(--green);background:#eefdf2;}
.section-card .icon{font-size:30px;}
.section-card h3{margin:0;font-size:16px;}
.section-card p{margin:0;font-size:13px;color:var(--dark-soft);font-weight:600;}
.check-badge{position:absolute;top:10px;right:10px;font-size:20px;}

/* ---------- FLASHCARD / GAME AREA ---------- */
.stage{border-radius:24px;padding:24px;text-align:center;background:linear-gradient(160deg,#eaf3ff,#fff7e0 55%,#ffecec);border:3px dashed #b9d3ff;position:relative;}
.stage::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;border-radius:24px 24px 0 0;background:var(--speed);background-size:200% 100%;animation:speedmove 5s linear infinite;border-bottom:2px solid var(--obsidian);}
.flash-emoji{font-size:90px;line-height:1;margin-bottom:6px;}
.flash-big-letter{font-family:'Baloo 2',cursive;font-size:100px;font-weight:800;background:linear-gradient(135deg,var(--blue-deep),var(--red-deep));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
.flash-caption{font-size:20px;font-weight:700;margin-top:6px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px;}
.opt-btn{border:none;border-radius:18px;padding:18px 10px;font-size:19px;font-weight:800;background:white;box-shadow:0 4px 0 rgba(18,22,58,0.12);font-family:'Baloo 2',cursive;color:var(--dark);border:2px solid #eaf1ff;}
.opt-btn.correct{background:linear-gradient(135deg,var(--green),var(--green-deep));color:white;border-color:transparent;}
.opt-btn.wrong{background:linear-gradient(135deg,#ff9d9d,#e56b6b);color:white;border-color:transparent;}
.hint-box{margin-top:16px;background:#fff7e0;border-radius:16px;padding:12px 16px;font-weight:700;color:#7a5b00;font-size:14px;text-align:left;border:2px solid #ffe8a8;}
.feedback{margin-top:14px;font-family:'Baloo 2',cursive;font-size:19px;}
.tries-dots{display:flex;gap:6px;justify-content:center;margin-top:10px;}
.tries-dots span{width:10px;height:10px;border-radius:50%;background:#dbe8ff;}
.tries-dots span.used{background:var(--red);}
.tier-badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#5c3f00;padding:4px 12px;border-radius:12px;font-weight:800;font-size:12px;margin-bottom:8px;}

/* Tracing */
canvas.trace-canvas{width:100%;max-width:360px;height:260px;background:white;border-radius:20px;border:3px solid #b9d3ff;touch-action:none;display:block;margin:0 auto;}
.trace-controls{display:flex;gap:10px;justify-content:center;margin-top:12px;}
.small-btn{border:none;border-radius:14px;padding:10px 16px;font-weight:700;background:#eaf1ff;color:var(--blue-deep);border:2px solid #d9e6ff;}

/* Memory match */
.memgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:420px;margin:0 auto;}
.memcard{width:100%;border:none;font:inherit;aspect-ratio:1/1;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:24px;color:white;box-shadow:0 4px 0 rgba(18,22,58,0.2);}
.memcard.flipped,.memcard.matched{background:white;color:var(--dark);}
.memcard.matched{background:linear-gradient(135deg,var(--green),var(--green-deep));color:white;}

/* Reading corner */
.book-cover{width:100%;border-radius:18px;background:linear-gradient(135deg,#dbe8ff,#fff2c9 55%,#ffdada);padding:24px;text-align:center;margin-bottom:14px;border:3px solid #b9d3ff;position:relative;}
.book-cover::before{content:'⭐';position:absolute;top:24px;left:26px;font-size:22px;opacity:0.6;}
.book-cover::after{content:'💰';position:absolute;top:24px;right:26px;font-size:22px;opacity:0.6;}
.book-cover .emoji{font-size:56px;}
.vocab-chip{display:inline-block;background:#eafaf0;color:#1d7a4a;border-radius:12px;padding:6px 12px;font-weight:700;font-size:13px;margin:4px 4px 0 0;border:1px solid #c9f2d8;}
ul.fun-list{padding-left:18px;margin:6px 0;}
ul.fun-list li{margin-bottom:6px;font-size:14px;font-weight:600;color:var(--dark-soft);}

/* Rewards */
.sticker-wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:10px;}
.sticker{font-size:34px;background:#f7faff;border-radius:14px;display:flex;align-items:center;justify-content:center;aspect-ratio:1/1;box-shadow:0 3px 0 rgba(18,22,58,0.1);border:2px solid #dbe8ff;}
.sticker.locked{opacity:0.25;filter:grayscale(1);}

/* Parent dashboard bars */
.bar-row{margin-bottom:12px;}
.bar-row .lbl{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px;}
.bar-track{height:12px;background:#eaf1ff;border-radius:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:8px;}

/* Confetti */
.confetti-piece{position:fixed;top:-20px;width:10px;height:16px;opacity:0.9;z-index:999;border-radius:3px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0.3;}}

/* Modal / celebration */
.overlay{position:fixed;inset:0;background:rgba(18,22,58,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal{background:white;border-radius:28px;padding:28px;max-width:360px;text-align:center;box-shadow:0 12px 0 rgba(0,0,0,0.15);border:4px solid transparent;background-image:linear-gradient(white,white),var(--speed);background-origin:border-box;background-clip:padding-box, border-box;}
.modal .big-emoji{font-size:64px;}

footer.note{text-align:center;font-size:11px;color:var(--dark-soft);opacity:0.75;margin-top:20px;line-height:1.5;}
.backbtn{background:none;border:none;color:var(--blue-deep);font-weight:800;font-size:14px;margin-bottom:10px;padding:6px 0;}
</style>
</head>

const STORAGE_KEY = 'joseph_turbo_academy_v1';
function defaultState(){
  return {
    coins:0,
    unlockedDay:1,
    days:{},
    tierProgress:{}, // per day+subject tier tracking not strictly needed, engine handles per-session
    stickers:[],
    memoryHistory:{},   // per-day memory game results: {pairs, timeSec, mistakes, rating}
    memoryBestTimes:{}, // best completion time per difficulty (pairs count)
  };
}
var state = load();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }
function dayState(d){
  if(!state.days[d]) state.days[d] = {math:false,reading:false,sight:false,ninja:false,write:false,memory:false,quiz:false,story:false,video:false,complete:false,videoNotes:{}};
  const s = state.days[d];
  if(s.video === undefined) s.video = false;
  if(!s.videoNotes) s.videoNotes = {};
  return s;
}
function getVideoNotes(d){ return dayState(d).videoNotes; }
const ALL_SECTIONS = ['math','reading','sight','ninja','write','memory','quiz','story','video'];
function sectionsDoneCount(d){
  const s = dayState(d);
  return ALL_SECTIONS.filter(k=>s[k]).length;
}
function markSectionComplete(d, key){
  const s = dayState(d);
  if(!s[key]){ s[key]=true; state.coins += 1; addSticker(d,key); }
  if(ALL_SECTIONS.every(k=>s[k]) && !s.complete){
    s.complete = true;
    state.coins += 5;
    if(state.unlockedDay === d && d < TOTAL_DAYS) state.unlockedDay = d+1;
    save();
    render('celebrate', {day:d});
    return;
  }
  save();
}
const STICKER_EMOJIS = ['⭐','💰','⚡','🏁','🍄','🎮','🔵','🏆','🧢','💎','🌟','🚀'];
function addSticker(d,key){
  const idx = (d*7 + ALL_SECTIONS.indexOf(key)) % STICKER_EMOJIS.length;
  state.stickers.push(STICKER_EMOJIS[idx]);
}

function focusForDay(d){ return DAY_FOCUS[d-1]; }
function bookForDay(d){ return BOOKS.find(b=>b.days.includes(d)) || BOOKS[0]; }
function shuffle(arr){ return arr.slice().sort(()=>Math.random()-0.5); }
function pickDistinct(pool, exclude, n){ const filtered = pool.filter(x=>String(x)!==String(exclude)); return shuffle(filtered).slice(0,n); }
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

/* =========================================================
   READ-ALOUD (Text-to-Speech)
   Lets Joseph hear the directions for any activity or the current
   question read out loud, so he always knows exactly what to do
   even before he's reading independently.
   ========================================================= */
function stripForSpeech(html){
  return String(html)
    .replace(/<[^>]*>/g, ' ')      // drop HTML tags
    .replace(/&amp;/g, 'and')
    .replace(/&[a-z]+;/g, ' ')     // drop other HTML entities
    .replace(/[⭐🌟🎯🏆🚀🎮🔤🔢⚡🎬🏁💰🍄🦔🎀🌈🧁🍎🐛🍭]/g, '')
    .replace(/\s+/g, ' ')
    .replace(/\s[+\-](?=\s*[.!?]|\s*$)/g, '')  // drop a stray +/- left dangling after emoji removal
    .trim();
}
function speakText(text){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.88;
    utter.pitch = 1.05;
    const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
    const preferred = voices.find(v => /en(-|_)US/i.test(v.lang)) || voices.find(v => /^en/i.test(v.lang));
    if(preferred) utter.voice = preferred;
    window.speechSynthesis.speak(utter);
  }catch(e){ /* speech synthesis unsupported or blocked — fail silently */ }
}

/* =========================================================
   GENERIC ADAPTIVE ENGINE (3-tier escalation)
   deck: [{stageHTML, options:[{label,correct}], hints:[...], explain, tier}]
   On correct answer -> advance to next card (which should be a harder tier if available)
   ========================================================= */
var engineState = {};
function startEngine(deckId, deck, onDeckComplete){
  engineState = {deckId, deck, idx:0, tries:0, locked:false, onDeckComplete};
  renderEngineCard();
}
function renderEngineCard(){
  const st = engineState;
  const item = st.deck[st.idx];
  const stageArea = document.getElementById('engine-stage');
  const optArea = document.getElementById('engine-opts');
  const feedArea = document.getElementById('engine-feedback');
  const dotsArea = document.getElementById('engine-dots');
  if(!stageArea) return;
  stageArea.innerHTML = (item.tier ? `<div class="tier-badge">${item.tier}</div>` : '') + item.stageHTML;
  optArea.innerHTML = item.options.map((o,i)=>`<button class="opt-btn" id="opt-${i}" onclick="answerEngine(${i})">${o.label}</button>`).join('');
  feedArea.innerHTML='';
  dotsArea.innerHTML = [0,1,2,3].map(i=>`<span class="${i < st.tries ? 'used':''}"></span>`).join('');
  st.locked=false;
  document.getElementById('engine-progress').innerText = `Card ${st.idx+1} of ${st.deck.length}`;
}
function answerEngine(i){
  const st = engineState;
  if(st.locked) return;
  const item = st.deck[st.idx];
  const opt = item.options[i];
  const feedArea = document.getElementById('engine-feedback');
  const btn = document.getElementById('opt-'+i);
  if(opt.correct){
    st.locked = true;
    btn.classList.add('correct');
    feedArea.innerHTML = `<div class="feedback">🏆 Nice! You leveled up!</div>`;
    setTimeout(()=>{
      st.idx++; st.tries=0;
      if(st.idx >= st.deck.length){ if(st.onDeckComplete) st.onDeckComplete(); }
      else { renderEngineCard(); }
    }, 1000);
  } else {
    btn.classList.add('wrong');
    st.tries++;
    if(st.tries >= 4){
      st.locked = true;
      feedArea.innerHTML = `<div class="hint-box">💪 Great effort! Here's the answer: <b>${item.options.find(o=>o.correct).label}</b><br>${item.explain}
      <div style="margin-top:8px;">${readAloudButtonHTML('speakCurrentHint()', 'Read the answer out loud')}</div></div>
      <button class="big-btn green" style="margin-top:12px;" onclick="engineConfirm()">Got it! Keep going ➡️</button>`;
    } else {
      feedArea.innerHTML = `<div class="hint-box">💡 Hint ${st.tries}: ${item.hints[Math.min(st.tries-1, item.hints.length-1)]}
      <div style="margin-top:8px;">${readAloudButtonHTML('speakCurrentHint()', 'Read this hint out loud')}</div></div>`;
      document.getElementById('engine-dots').innerHTML = [0,1,2,3].map(i=>`<span class="${i < st.tries ? 'used':''}"></span>`).join('');
    }
  }
}
function speakCurrentHint(){
  const st = engineState;
  if(!st || !st.deck || !st.deck[st.idx]) return;
  const item = st.deck[st.idx];
  if(st.tries >= 4){
    const correctLabel = item.options.find(o=>o.correct).label;
    speakText(`Here's the answer: ${stripForSpeech(correctLabel)}. ${stripForSpeech(item.explain)}`);
  } else if(st.tries >= 1){
    const hintText = item.hints[Math.min(st.tries-1, item.hints.length-1)];
    speakText(`Hint ${st.tries}: ${stripForSpeech(hintText)}`);
  }
}
function engineConfirm(){
  const st = engineState;
  st.idx++; st.tries=0;
  if(st.idx >= st.deck.length){ if(st.onDeckComplete) st.onDeckComplete(); }
  else { renderEngineCard(); }
}

function numOptions(correct, spread){
  const distractors = pickDistinct(Array.from({length:30},(_,i)=>i), correct, 3).filter(x=>x>=0);
  let pool = [];
  for(let i=1;i<=6;i++){ if(correct-i>=0) pool.push(correct-i); pool.push(correct+i); }
  pool = shuffle([...new Set(pool)]).slice(0,3);
  while(pool.length<3){ pool.push(correct + pool.length + 4); }
  return shuffle([{label:String(correct),correct:true}, ...pool.map(x=>({label:String(x),correct:false}))]);
}
function buildMathDeck(d){
  const topic = focusForDay(d).mathTopic;

function initTraceCanvas(d){
  const canvas = document.getElementById('traceCanvas');
  if(!canvas) return;
  const ctx2d = canvas.getContext('2d');
  window._traceCanvas = canvas;

  function currentWord(){ return writeState.words[writeState.idx]; }
  function fontSizeFor(word){ return word.length > 6 ? 50 : (word.length > 4 ? 64 : 88); }
  function drawGuide(){
    const word = currentWord();
    ctx2d.clearRect(0,0,canvas.width,canvas.height);
    ctx2d.font = `400 ${fontSizeFor(word)}px "Andika", sans-serif`;
    ctx2d.fillStyle = '#c3d4f5';
    ctx2d.textAlign='center';
    ctx2d.textBaseline='middle';
    ctx2d.fillText(word, canvas.width/2, canvas.height/2+10);
  }
  window._drawTraceGuide = drawGuide;
  window._fontSizeFor = fontSizeFor;

  ctx2d.strokeStyle = '#1E6FFF';
  ctx2d.lineWidth = 7;
  ctx2d.lineCap = 'round';
  let drawing=false;
  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {x:(clientX-rect.left)*scaleX, y:(clientY-rect.top)*scaleY};
  }
  function start(e){ drawing=true; const p=pos(e); ctx2d.beginPath(); ctx2d.moveTo(p.x,p.y); e.preventDefault(); }
  function move(e){ if(!drawing) return; const p=pos(e); ctx2d.lineTo(p.x,p.y); ctx2d.stroke(); e.preventDefault(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
  window.clearTrace = function(){ drawGuide(); };

  startWriting(d);
}
function startWriting(d){
  writeState = {day:d, words: focusForDay(d).sightSet, idx:0, attempts:0};
  loadWriteWord();
}
function loadWriteWord(){
  const w = writeState.words[writeState.idx];
  const progEl = document.getElementById('write-progress');
  const labelEl = document.getElementById('write-word-label');
  const feedEl = document.getElementById('write-feedback');
  if(progEl) progEl.innerText = `Word ${writeState.idx+1} of ${writeState.words.length}`;
  if(labelEl) labelEl.innerText = `Trace: "${w}"`;
  if(feedEl) feedEl.innerHTML = '';
  writeState.attempts = 0;
  const draw = () => { if(window._drawTraceGuide) window._drawTraceGuide(); };
  if(document.fonts && document.fonts.load){
    document.fonts.load('400 80px "Andika"').then(draw).catch(draw);
  } else {
    draw();
  }
}
/* Pixel-based accuracy check: renders the guide word to an offscreen
   canvas, compares it against the child's ink strokes, and scores both
   how much of the letter shape got covered and how much stray ink there
   was outside the letters — combined into one accuracy percentage. */
function computeTraceAccuracy(canvas, word, fontSize){
  const w = canvas.width, h = canvas.height;
  const guideCanvas = document.createElement('canvas');
  guideCanvas.width = w; guideCanvas.height = h;
  const gctx = guideCanvas.getContext('2d');
  gctx.font = `400 ${fontSize}px "Andika", sans-serif`;
  gctx.textAlign='center'; gctx.textBaseline='middle';
  gctx.fillStyle = '#000';
  gctx.fillText(word, w/2, h/2+10);
  const guideData = gctx.getImageData(0,0,w,h).data;

  const uctx = canvas.getContext('2d');
  const userData = uctx.getImageData(0,0,w,h).data;

  const guidePixels = [];
  const inkPixels = [];
  for(let i=0;i<w*h;i++){
    if(guideData[i*4+3] > 40) guidePixels.push(i);
    const r = userData[i*4], g = userData[i*4+1], b = userData[i*4+2];
    if(b > 140 && b > r + 30 && b > g + 10) inkPixels.push(i);
  }
  if(guidePixels.length === 0 || inkPixels.length === 0) return {score:0, coverage:0, accuracy:0};

  const R = 7;
  const guideTol = dilateSet(guidePixels, w, h, R);
  const inkTol = dilateSet(inkPixels, w, h, R);

  let covered = 0;
  for(const idx of guidePixels){ if(inkTol.has(idx)) covered++; }
  const coverage = covered / guidePixels.length;

  let accurate = 0;
  for(const idx of inkPixels){ if(guideTol.has(idx)) accurate++; }
  const accuracy = accurate / inkPixels.length;

  const score = Math.round(Math.min(100, (coverage*0.6 + accuracy*0.4) * 100));
  return {score, coverage:Math.round(coverage*100), accuracy:Math.round(accuracy*100)};
}
function dilateSet(pixels, w, h, R){
  const set = new Set();
  const R2 = R*R;
  for(const idx of pixels){
    const x = idx % w, y = (idx / w) | 0;
    for(let dy=-R; dy<=R; dy++){
      const ny = y+dy; if(ny<0||ny>=h) continue;
      const rowBase = ny*w;
      for(let dx=-R; dx<=R; dx++){
        if(dx*dx+dy*dy > R2) continue;
        const nx = x+dx; if(nx<0||nx>=w) continue;
        set.add(rowBase+nx);
      }
    }
  }
  return set;
}
function checkTrace(d){
  const canvas = window._traceCanvas;
  if(!canvas) return;
  const word = writeState.words[writeState.idx];
  const fontSize = window._fontSizeFor ? window._fontSizeFor(word) : 80;
  const result = computeTraceAccuracy(canvas, word, fontSize);
  writeState.attempts++;
  const feedEl = document.getElementById('write-feedback');
  if(result.score >= 95){
    writeState.lastFeedbackText = `Amazing! ${result.score}% accuracy — that's a perfect trace!`;
    feedEl.innerHTML = `<div class="hint-box" style="background:#eafaf0;border-color:#b8f0cf;color:#1d7a4a;">🌟 Amazing! ${result.score}% accuracy — that's a perfect trace!
    <div style="margin-top:8px;">${readAloudButtonHTML('speakWriteFeedback()', 'Read this out loud')}</div></div>
    <button class="big-btn green" style="margin-top:10px;width:auto;" onclick="nextWriteWord(${d})">Next Word ➡️</button>`;
  } else if(result.score >= 90){
    writeState.lastFeedbackText = `Great job! ${result.score}% accuracy — nice tracing!`;
    feedEl.innerHTML = `<div class="hint-box" style="background:#eafaf0;border-color:#b8f0cf;color:#1d7a4a;">🎉 Great job! ${result.score}% accuracy — nice tracing!
    <div style="margin-top:8px;">${readAloudButtonHTML('speakWriteFeedback()', 'Read this out loud')}</div></div>
    <button class="big-btn green" style="margin-top:10px;width:auto;" onclick="nextWriteWord(${d})">Next Word ➡️</button>`;
  } else if(writeState.attempts >= 3){
    writeState.lastFeedbackText = `Nice effort — ${result.score}% this time! Let's move on and we'll practice this word again soon.`;
    feedEl.innerHTML = `<div class="hint-box">💪 Nice effort — ${result.score}% this time! Let's move on and we'll practice this word again soon.
    <div style="margin-top:8px;">${readAloudButtonHTML('speakWriteFeedback()', 'Read this out loud')}</div></div>
    <button class="big-btn green" style="margin-top:10px;width:auto;" onclick="nextWriteWord(${d})">Continue ➡️</button>`;
  } else {
    writeState.lastFeedbackText = `You got ${result.score}% — so close! Trace slowly, right on top of the pale letters.`;
    feedEl.innerHTML = `<div class="hint-box">✏️ You got ${result.score}% — so close! Trace slowly, right on top of the pale letters. (Attempt ${writeState.attempts} of 3)
    <div style="margin-top:8px;">${readAloudButtonHTML('speakWriteFeedback()', 'Read this out loud')}</div></div>
    <button class="small-btn" style="margin-top:10px;" onclick="clearTrace()">🧽 Clear &amp; Try Again</button>`;
  }
}

/* =========================================================
   MEMORY MATCH
   Adaptive difficulty (more pairs as days progress, nudged by
   how fast/accurate the previous day's game was), a live timer,
   and an extra "fireworks" celebration when Joseph beats his
   personal best time for that difficulty level.
   ========================================================= */
var memState = {};
const MEMORY_SYMBOL_POOL = ['🎮','🔤','⚡','🎯','⭐','💰','🏁','🍄','🚀','🏆'];
function pairsForDay(d){
  // Baseline trends upward across the 14 days: 4 pairs early, up to 8 by the end.
  const base = Math.min(8, 4 + Math.floor((d-1)/3));
  // Nudge based on how the previous day's memory game went.
  const prev = state.memoryHistory && state.memoryHistory[d-1];
  let adj = 0;
  if(prev){
    if(prev.rating === 'fast') adj = 1;
    else if(prev.rating === 'slow') adj = -1;
  }
  return Math.max(4, Math.min(8, base + adj));
}
function parTimeSeconds(pairs){ return pairs * 6; }
function memoryHTML(d){
  return activityHeader(d, `🧠 Memory Match`) +
  `<p class="sub">Flip two cards and find the matching pairs — try to beat your best time!</p>
  <div class="stage">
    ${readAloudButtonHTML(`speakSimple('Flip two cards and find the matching pairs. Try to beat your best time!')`, 'Read the directions out loud')}
    <div style="display:flex;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;margin-top:10px;">
      <div class="pill" id="mem-timer">⏱️ 0:00</div>
      <div class="pill" id="mem-tries" style="background:#ffe9d6;color:#b5540a;">🔄 0 tries</div>
    </div>
    <div class="memgrid" id="memgrid"></div>
    <div id="memWin" style="margin-top:14px;"></div>
  </div>
  </div>`;
}
function initMemoryGame(d){
  const pairs = pairsForDay(d);
  const symbols = MEMORY_SYMBOL_POOL.slice(0, pairs);
  let cards = shuffle([...symbols, ...symbols]).map((s,i)=>({id:i, val:s, flipped:false, matched:false}));
  const cols = pairs <= 4 ? 4 : (pairs <= 6 ? 4 : 5);
  const grid = document.getElementById('memgrid');
  if(grid) grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  memState = {cards, first:null, second:null, lock:false, dayNum:d, pairs, mistakes:0, startTime:Date.now(), timerId:null, finished:false};
  memState.timerId = setInterval(updateMemTimer, 1000);
  renderMemGrid();
}
function updateMemTimer(){
  if(!memState || memState.finished) return;
  const el = document.getElementById('mem-timer');
  if(!el) return;
  const secs = Math.floor((Date.now()-memState.startTime)/1000);
  const m = Math.floor(secs/60), s = secs%60;
  el.innerText = `⏱️ ${m}:${s<10?'0':''}${s}`;
}
function renderMemGrid(){
  const grid = document.getElementById('memgrid');
  if(!grid) return;
  grid.innerHTML = memState.cards.map(c=>`<button class="memcard ${c.flipped||c.matched?'flipped':''} ${c.matched?'matched':''}" onclick="flipMem(${c.id})" ${c.matched?'disabled':''} aria-label="${c.matched?'Matched card: '+c.val:(c.flipped?'Card showing '+c.val:'Face-down card, tap to flip')}">${(c.flipped||c.matched) ? c.val : '<span style="font-family: Baloo 2, sans-serif; font-weight:800;">?</span>'}</button>`).join('');
  const triesEl = document.getElementById('mem-tries');
  if(triesEl) triesEl.innerText = `🔄 ${memState.mistakes} ${memState.mistakes===1?'try':'tries'}`;
  if(memState.cards.every(c=>c.matched) && !memState.finished){
    completeMemoryGame();
  }
}
function flipMem(id){
  if(memState.lock || memState.finished) return;
  const c = memState.cards.find(x=>x.id===id);
  if(c.flipped||c.matched) return;
  c.flipped = true;
  if(!memState.first){ memState.first = c; }
  else if(!memState.second){
    memState.second = c;
    memState.lock = true;
    renderMemGrid();
    setTimeout(()=>{
      if(memState.first.val === memState.second.val){ memState.first.matched = true; memState.second.matched = true; }
      else { memState.first.flipped = false; memState.second.flipped = false; memState.mistakes++; }
      memState.first = null; memState.second=null; memState.lock=false;
      renderMemGrid();
    }, 700);
    return;
  }
  renderMemGrid();
}
function completeMemoryGame(){
  memState.finished = true;
  if(memState.timerId) clearInterval(memState.timerId);
  const elapsed = Math.round((Date.now()-memState.startTime)/1000);
  const pairs = memState.pairs;
  const par = parTimeSeconds(pairs);
  const mistakesPar = pairs;

  let rating = 'steady';
  if(elapsed <= par*0.75 && memState.mistakes <= mistakesPar*0.5) rating = 'fast';
  else if(elapsed >= par*1.4 || memState.mistakes >= mistakesPar*1.5) rating = 'slow';

  if(!state.memoryHistory) state.memoryHistory = {};
  if(!state.memoryBestTimes) state.memoryBestTimes = {};
  state.memoryHistory[memState.dayNum] = {pairs, timeSec:elapsed, mistakes:memState.mistakes, rating};

  const prevBest = state.memoryBestTimes[pairs];
  const isNewRecord = (prevBest === undefined) || (elapsed < prevBest);
  if(isNewRecord) state.memoryBestTimes[pairs] = elapsed;
  save();

  const m = Math.floor(elapsed/60), s = elapsed%60;
  const timeStr = `${m}:${s<10?'0':''}${s}`;

  let message, headline;
  if(isNewRecord && prevBest !== undefined){
    headline = '🎆 NEW RECORD! 🎆';
    message = `You finished in ${timeStr} — faster than your best time ever at this level! Joseph's memory is getting SO sharp!`;
    launchFireworks();
  } else if(rating === 'fast'){
    headline = '🌟 Lightning Fast!';
    message = `${timeStr} with only ${memState.mistakes} ${memState.mistakes===1?'try':'tries'} — amazing focus!`;
    launchConfetti();
  } else if(rating === 'slow'){
    headline = '💪 You Did It!';
    message = `You finished in ${timeStr}. Memory games get easier with practice — Joseph is building his brain muscles!`;
    launchConfetti();
  } else {
    headline = '🏆 Great Job!';
    message = `You finished in ${timeStr} with ${memState.mistakes} ${memState.mistakes===1?'try':'tries'}. Nice steady focus!`;
    launchConfetti();
  }

  document.getElementById('memWin').innerHTML = `
    <div class="feedback">${headline}</div>
    <p class="sub" style="margin-top:4px;">${message}</p>
    <button class="big-btn green" style="margin-top:10px;" onclick="finishMemory(${memState.dayNum})">Continue ➡️</button>`;
}

  setTimeout(()=>launchConfetti(), 350);
  setTimeout(()=>launchConfetti(), 700);
}

/* =========================================================
   VOICE-TO-TEXT DICTATION for Video Learning notes
   Lets Joseph speak his answer instead of typing it — the
   words appear live in the box and save automatically when
   he's done talking. Falls back gracefully with a friendly
   tip on browsers (like iOS Safari) that don't support the
   SpeechRecognition API, pointing to the keyboard's built-in
   dictation mic instead.
   ========================================================= */
var activeRecognition = null;
function startDictation(d, key){
  const textarea = document.getElementById(`${key}-${d}`);
  const micBtn = document.getElementById(`mic-${key}-${d}`);
  const hintEl = document.getElementById(`mic-hint-${key}-${d}`);
  if(!textarea || !micBtn) return;

  // If already listening, tapping again stops it early.
  if(activeRecognition){
    activeRecognition.stop();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    if(hintEl) hintEl.innerHTML = `💡 Voice typing isn't available in this browser. Try tapping the microphone icon on your keyboard instead!`;
    return;
  }

  try{
    const recognition = new SR();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = true;
    activeRecognition = recognition;

    const baseText = textarea.value ? textarea.value.trim() + ' ' : '';
    micBtn.classList.add('listening');
    micBtn.innerHTML = '🔴 Listening…';
    if(hintEl) hintEl.innerHTML = `🎙️ Speak now — tap the button again to stop.`;

    recognition.onresult = function(event){
      let transcript = '';
      for(let i=0; i<event.results.length; i++){
        transcript += event.results[i][0].transcript;
      }
      textarea.value = baseText + transcript;
    };
    recognition.onerror = function(event){
      if(hintEl){
        if(event.error === 'not-allowed' || event.error === 'permission-denied'){
          hintEl.innerHTML = `💡 Microphone access was blocked. Please allow microphone permission to use Speak.`;
        } else if(event.error === 'no-speech'){
          hintEl.innerHTML = `💡 Didn't catch that — tap 🎤 Speak and try again.`;
        } else {
          hintEl.innerHTML = `💡 Voice typing had a hiccup — you can always type instead!`;
        }
      }
    };
    recognition.onend = function(){
      micBtn.classList.remove('listening');
      micBtn.innerHTML = '🎤 Speak';
      activeRecognition = null;
      saveVideoAnswer(d, key, textarea.value);
    };
    recognition.start();
  }catch(e){
    if(hintEl) hintEl.innerHTML = `💡 Voice typing isn't available right now. Please type your answer instead.`;
    micBtn.classList.remove('listening');
    micBtn.innerHTML = '🎤 Speak';
    activeRecognition = null;
  }
}
